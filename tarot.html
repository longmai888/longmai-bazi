    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(180deg, #1a1a2e 0%, #2d1b4e 50%, #4a148c 100%);
            background-attachment: fixed;
            min-height: 100vh;
            line-height: 1.6;
            color: #fff;
        }
        .tarot-hero {
            background: linear-gradient(135deg, #4a148c 0%, #764ba2 50%, #f5b041 100%);
            color: white;
            padding: 60px 20px;
            text-align: center;
            margin-bottom: 40px;
            border-bottom: 2px solid rgba(243, 156, 18, 0.5);
        }
        .tarot-hero h1 { 
            font-size: 2.5rem; 
            margin-bottom: 10px; 
            background: linear-gradient(135deg, #ffffff 0%, #f5b041 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
        }
        .tarot-hero p { font-size: 1.1rem; opacity: 0.9; color: rgba(255,255,255,0.85); }
        .tarot-content { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 0 20px 60px; 
        }
        .tarot-content h2 {
            color: #f5b041;
            text-shadow: 0 0 10px rgba(243, 156, 18, 0.3);
        }
        .tarot-content p {
            color: rgba(255, 255, 255, 0.85);
        }
        .spread-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .spread-btn {
            padding: 15px 30px;
            background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(243, 156, 18, 0.5);
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.1rem;
            color: #f5b041;
        }
        .spread-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: #f5b041;
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(243, 156, 18, 0.3);
        }
        .spread-btn.active {
            background: linear-gradient(135deg, #764ba2, #f5b041);
            color: white;
            border-color: #f5b041;
            box-shadow: 0 4px 20px rgba(243, 156, 18, 0.4);
        }
        .card-deck {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px;
            margin: 30px 0;
        }
        .tarot-card {
            aspect-ratio: 2/3;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 0.9rem;
            text-align: center;
            padding: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .tarot-card:hover {
            transform: translateY(-5px) rotateY(10deg);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        .tarot-card.revealed {
            background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(155, 123, 199, 0.3);
            
            border: 2px solid #9966CC;
        }
        .reading-area {
            background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(155, 123, 199, 0.3);
            border-radius: 15px;
            padding: 30px;
            margin-top: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .reading-area h3 {
            color: #f5b041;
            margin-bottom: 20px;
            text-align: center;
        }
        .card-position {
            display: inline-block;
            margin: 10px;
            text-align: center;
        }
        .card-position .position-name {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 10px;
        }
        .instruction {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: center;
        }
        .instruction h3 {
            color: #f5b041;
            margin-bottom: 10px;
        }
        .instruction p {
            color: rgba(255, 255, 255, 0.8);
        }
        @media (max-width: 768px) {
            .tarot-hero h1 { font-size: 2rem; }
            .spread-btn { padding: 12px 20px; font-size: 1rem; }
            .card-deck { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
        }
    
        .btn-primary {
            background: linear-gradient(135deg, #764ba2 0%, #f5b041 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(243, 156, 18, 0.5);
        }
</style>
</head>
<body>

            <a href="liuyao.html">六爻预测</a>
        </div>
    </nav>

    <!-- 头部区域 -->
    <section class="tarot-hero">
        <h1>🔮 塔罗占卜</h1>
        <p>78张塔罗牌 · 5种牌阵 · AI智能解读</p>
    </section>

    <!-- 主要内容 -->
    <div class="tarot-content">
        <!-- 牌阵选择 -->
        <div class="spread-selector">
            <button class="spread-btn active" onclick="selectSpread('single')">单张牌</button>
            <button class="spread-btn" onclick="selectSpread('three')">三张牌</button>
            <button class="spread-btn" onclick="selectSpread('love')">爱情牌阵</button>
            <button class="spread-btn" onclick="selectSpread('career')">事业牌阵</button>
            <button class="spread-btn" onclick="selectSpread('celtic')">凯尔特十字</button>
        </div>

        <!-- 说明文字 -->
        <div class="instruction">
            <h3>请抽牌</h3>
            <p>选择塔罗牌阵，点击卡牌进行抽牌，获取AI智能解读</p>
        </div>

        <!-- 卡牌区域 -->
        <div class="card-deck" id="cardDeck">
            <!-- 卡牌将通过JavaScript生成 -->
        </div>

        <!-- 解读区域 -->
        <div class="reading-area" id="readingArea" style="display: none;">
            <h3>🔮 塔罗解读</h3>
            <div id="readingContent"></div>
        </div>
    </div>

    <!-- 底部 -->
    <footer style="background: #333; color: white; padding: 40px 20px; margin-top: 60px;">
        <div style="max-width: 1200px; margin: 0 auto; text-align: center;">
            <div style="margin-bottom: 20px;">
                <a href="about.html" style="color: white; margin: 0 15px;">关于我们</a>

                <a href="team.html" style="color: white; margin: 0 15px;">团队介绍</a>
                <a href="contact.html" style="color: white; margin: 0 15px;">联系我们</a>
            </div>
            <div style="margin-bottom: 20px;">
                <a href="user_agreement.html" style="color: #aaa; margin: 0 10px;">用户协议</a>
                <a href="privacy_policy.html" style="color: #aaa; margin: 0 10px;">隐私政策</a>
                <a href="disclaimer.html" style="color: #aaa; margin: 0 10px;">免责声明</a>
            </div>

                <p>联系方式</p>
                <p>邮箱：longmai@foxmail.com | 电话：400-XXX-XXXX</p>
                <p>地址：中国</p>
            </div>
            <p style="margin-top: 20px; color: rgba(255, 255, 255, 0.8);">&copy; 2026 龙脉文化 版权所有</p>
        </div>
    </footer>

    <script>
        // 塔罗牌数据
        const tarotCards = [
            { name: '愚者', nameEn: 'The Fool', meaning: '新的开始，冒险，纯真' },
            { name: '魔术师', nameEn: 'The Magician', meaning: '创造力，意志力，显化' },
            { name: '女祭司', nameEn: 'The High Priestess', meaning: '直觉，潜意识，神秘' },
            { name: '皇后', nameEn: 'The Empress', meaning: '丰饶，母性，创造力' },
            { name: '皇帝', nameEn: 'The Emperor', meaning: '权威，结构，控制' },
            { name: '教皇', nameEn: 'The Hierophant', meaning: '传统，信仰，指导' },
            { name: '恋人', nameEn: 'The Lovers', meaning: '爱情，选择，和谐' },
            { name: '战车', nameEn: 'The Chariot', meaning: '意志力，胜利，决心' },
            { name: '力量', nameEn: 'Strength', meaning: '勇气，耐心，内在力量' },
            { name: '隐者', nameEn: 'The Hermit', meaning: '内省，独处，寻找真理' },
            { name: '命运之轮', nameEn: 'Wheel of Fortune', meaning: '变化，周期，命运' },
            { name: '正义', nameEn: 'Justice', meaning: '公正，平衡，因果' },
            { name: '倒吊人', nameEn: 'The Hanged Man', meaning: '牺牲，新视角，等待' },
            { name: '死神', nameEn: 'Death', meaning: '结束，转变，新生' },
            { name: '节制', nameEn: 'Temperance', meaning: '平衡，调和，耐心' },
            { name: '恶魔', nameEn: 'The Devil', meaning: '束缚，欲望，物质主义' },
            { name: '塔', nameEn: 'The Tower', meaning: '突变，觉醒，破坏' },
            { name: '星星', nameEn: 'The Star', meaning: '希望，灵感，宁静' },
            { name: '月亮', nameEn: 'The Moon', meaning: '幻觉，恐惧，潜意识' },
            { name: '太阳', nameEn: 'The Sun', meaning: '成功，活力，喜悦' },
            { name: '审判', nameEn: 'Judgement', meaning: '重生，觉醒，救赎' },
            { name: '世界', nameEn: 'The World', meaning: '完成，成就，圆满' }
        ];

        let currentSpread = 'single';
        let selectedCards = [];

        // 初始化卡牌
        function initCards() {
            const deck = document.getElementById('cardDeck');
            deck.innerHTML = '';
            
            for (let i = 0; i < 22; i++) {
                const card = document.createElement('div');
                card.className = 'tarot-card';
                card.innerHTML = '🔮<br>塔罗牌';
                card.onclick = () => drawCard(i);
                deck.appendChild(card);
            }
        }

        // 选择牌阵
        function selectSpread(spread) {
            currentSpread = spread;
            selectedCards = [];
            
            // 更新按钮状态
            document.querySelectorAll('.spread-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 重置卡牌
            initCards();
            
            // 隐藏解读区域
            document.getElementById('readingArea').style.display = 'none';
            
            // 更新说明
            const instructions = {
                'single': '请抽一张牌，获取当前状况的指引',
                'three': '请抽三张牌，代表过去、现在、未来',
                'love': '请抽三张牌，解读爱情运势',
                'career': '请抽三张牌，解读事业发展',
                'celtic': '请抽十张牌，进行深度解读'
            };
            document.querySelector('.instruction p').textContent = instructions[spread];
        }

        // 抽牌
        function drawCard(index) {
            const cards = document.querySelectorAll('.tarot-card');
            const card = cards[index];
            
            if (card.classList.contains('revealed')) return;
            
            // 随机选择一张塔罗牌
            const randomCard = tarotCards[Math.floor(Math.random() * tarotCards.length)];
            
            card.classList.add('revealed');
            card.innerHTML = `<strong>${randomCard.name}</strong><br><small>${randomCard.nameEn}</small>`;
            
            selectedCards.push({
                index: index,
                card: randomCard
            });
            
            // 检查是否完成抽牌
            const requiredCards = {
                'single': 1,
                'three': 3,
                'love': 3,
                'career': 3,
                'celtic': 10
            };
            
            if (selectedCards.length >= requiredCards[currentSpread]) {
                showReading();
            }
        }

        // 显示解读
        function showReading() {
            const readingArea = document.getElementById('readingArea');
            const readingContent = document.getElementById('readingContent');
            
            let html = '';
            
            const positions = {
                'single': ['当前状况'],
                'three': ['过去', '现在', '未来'],
                'love': ['你', '对方', '关系发展'],
                'career': ['现状', '挑战', '建议'],
                'celtic': ['现状', '障碍', '基础', '过去', '未来', '自我', '环境', '希望', '结果', ' outcome']
            };
            
            selectedCards.forEach((item, index) => {
                const position = positions[currentSpread][index] || `位置${index + 1}`;
                html += `
                    <div class="card-position">
                        <div style="font-size: 1.2rem; margin-bottom: 10px;">
                            <strong>${item.card.name}</strong> (${item.card.nameEn})
                        </div>
                        <div style="color: rgba(255, 255, 255, 0.8); margin-bottom: 5px;">
                            <strong>位置：</strong>${position}
                        </div>
                        <div style="color: #f5b041; margin-bottom: 10px;">
                            <strong>含义：</strong>${item.card.meaning}
                        </div>
                        <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; text-align: left;">
                            <strong>AI解读：</strong><br>
                            ${generateInterpretation(item.card, position)}
                        </div>
                    </div>
                `;
            });
            
            readingContent.innerHTML = html;
            readingArea.style.display = 'block';
            readingArea.scrollIntoView({ behavior: 'smooth' });
        }

        // 生成AI解读
        function generateInterpretation(card, position) {
            const interpretations = {
                '愚者': '这是一个全新的开始，放下顾虑，勇敢迈出第一步。保持开放的心态，相信直觉。',
                '魔术师': '你拥有实现目标所需的所有资源和能力。现在是采取行动的最佳时机。',
                '女祭司': '相信你的直觉和内在智慧。答案就在你心中，需要静心聆听。',
                '皇后': '拥抱丰饶和创造力。关注自我关爱，培养内心的平静与喜悦。',
                '皇帝': '建立结构和秩序。运用理性和权威，为自己设定清晰的界限。',
                '恋人': '重要的选择即将到来。倾听内心，选择符合你真实价值观的道路。',
                '战车': '通过意志力和决心，你将克服障碍取得胜利。保持专注，不要放弃。',
                '力量': '以温柔而坚定的方式面对挑战。真正的力量来自内心的平静。',
                '命运之轮': '变化正在发生，顺应周期。好运即将到来，保持开放。',
                '太阳': '成功和喜悦就在前方。保持积极乐观，分享你的光芒。'
            };
            
            return interpretations[card.name] || `${card.name}出现在${position}位置，暗示着${card.meaning}的能量正在影响这个领域。建议保持觉察，顺应变化。`;
        }

        // 初始化
        initCards();
    </script>
</body>

    <style>
        .luopan-hero { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); color: white; padding: 40px 20px; text-align: center; margin-bottom: 40px; }
        .luopan-hero h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .luopan-content { max-width: 1200px; margin: 0 auto; padding: 0 20px 60px; }
        .compass-container { width: 350px; height: 350px; margin: 30px auto; position: relative; background: radial-gradient(circle, #FFD700, #FFA500, #8B4513); border-radius: 50%; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .compass-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; background: #8B4513; border-radius: 50%; border: 3px solid #FFD700; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: white; font-weight: bold; }
        .compass-needle { position: absolute; top: 50%; left: 50%; width: 4px; height: 150px; background: linear-gradient(180deg, red 0%, red 50%, white 50%, white 100%); transform-origin: bottom center; transform: translate(-50%, -100%) rotate(0deg); transition: transform 1s ease-out; box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        .direction-labels { position: absolute; width: 100%; height: 100%; }
        .direction-label { position: absolute; font-weight: bold; font-size: 1.2rem; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .direction-label.north { top: 10px; left: 50%; transform: translateX(-50%); color: #FF0000; }
        .direction-label.south { bottom: 10px; left: 50%; transform: translateX(-50%); }
        .direction-label.east { right: 10px; top: 50%; transform: translateY(-50%); }
        .direction-label.west { left: 10px; top: 50%; transform: translateY(-50%); }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 15px 40px; border-radius: 25px; font-size: 1.1rem; cursor: pointer; display: block; margin: 20px auto; }
        .form-group { margin-bottom: 20px; background: white; padding: 20px; border-radius: 12px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="luopan-hero">
        <h1>🧭 风水罗盘</h1>
        <p class="subtitle">精准定向 · 堪舆布局 · 趋吉避凶</p>
    </div>
    <div class="luopan-content">
        <div class="compass-container">
            <div class="direction-labels">
                <div class="direction-label north">?</div>
                <div class="direction-label south">?</div>
                <div class="direction-label east">?</div>
                <div class="direction-label west">?</div>
            </div>
            <div class="compass-needle" id="compass-needle"></div>
            <div class="compass-center">罗盘</div>
        </div>
        <div class="form-group">
            <label>输入方位角度?-360°</label>
            <input type="number" id="degree-input" min="0" max="360" placeholder="0-360">
        </div>
        <button class="btn-primary" onclick="setDirection()">设置方位</button>
        <button class="btn-primary" onclick="autoDetect()">自动检测方</button>
        <div id="result" style="display: none; background: white; padding: 25px; border-radius: 12px; margin-top: 30px;">
            <h4 style="color: #764ba2; margin-bottom: 15px;">方位分析</h4>
            <p id="direction-text" style="line-height: 1.8; color: #555;"></p>
        </div>
    </div>

    <style>
        .match-hero {
            background: linear-gradient(135deg, #FF69B4 0%, #FFB6C1 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
            margin-bottom: 40px;
        }
        .match-hero h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .match-content { max-width: 1000px; margin: 0 auto; padding: 0 20px 60px; }
        .couple-input {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 20px;
            align-items: center;
            margin: 30px 0;
        }
        .person-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .heart-icon {
            font-size: 3rem;
            text-align: center;
            color: #FF69B4;
        }
        .match-score {
            text-align: center;
            font-size: 5rem;
            font-weight: bold;
            color: #FF69B4;
            margin: 40px 0;
        }
        .score-ring {
            width: 200px;
            height: 200px;
            margin: 0 auto;
            border-radius: 50%;
            background: conic-gradient(#FF69B4 0% 85%, #f0f0f0 85% 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .score-inner {
            width: 160px;
            height: 160px;
            background: white;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .analysis-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .compatibility-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .compatibility-item {
            text-align: center;
            padding: 20px;
            background: #fff0f5;
            border-radius: 12px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #FF69B4, #FFB6C1);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 25px;
            font-size: 1.1rem;
            cursor: pointer;
            display: block;
            margin: 20px auto;
        }
    </style>

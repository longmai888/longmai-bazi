<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#667eea;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f1c40f;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="centerGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#764ba2;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- 背景圆 -->
  <circle cx="200" cy="200" r="180" fill="url(#centerGrad)" stroke="#764ba2" stroke-width="3"/>
  
  <!-- 外圈装饰 -->
  <circle cx="200" cy="200" r="170" fill="none" stroke="url(#purpleGrad)" stroke-width="2"/>
  <circle cx="200" cy="200" r="160" fill="none" stroke="#f39c12" stroke-width="1" stroke-dasharray="10,5"/>
  
  <!-- 龙形图案（简化版） -->
  <g transform="translate(200, 120)" fill="none" stroke="url(#purpleGrad)" stroke-width="3" stroke-linecap="round">
    <!-- 龙身曲线 -->
    <path d="M-60,20 Q-40,0 -20,10 T20,10 T60,20" />
    <path d="M-50,35 Q-30,15 -10,25 T30,25 T70,35" opacity="0.7"/>
    <!-- 龙角 -->
    <path d="M-15,-5 L-25,-25 L-20,-30" />
    <path d="M15,-5 L25,-25 L20,-30" />
    <!-- 龙须 -->
    <path d="M-30,40 Q-40,55 -35,70" stroke-width="2"/>
    <path d="M30,40 Q40,55 35,70" stroke-width="2"/>
  </g>
  
  <!-- 中心"隆"字 -->
  <g transform="translate(200, 200)">
    <!-- 印章边框 -->
    <rect x="-50" y="-50" width="100" height="100" fill="none" stroke="#764ba2" stroke-width="3" rx="5"/>
    <!-- 隆字（简化路径） -->
    <g fill="#764ba2" stroke="none">
      <!-- 左耳旁 -->
      <rect x="-35" y="-30" width="8" height="50"/>
      <rect x="-35" y="-30" width="20" height="8"/>
      <rect x="-35" y="5" width="20" height="8"/>
      <!-- 右边部分 -->
      <rect x="-10" y="-30" width="35" height="8"/>
      <rect x="5" y="-30" width="8" height="50"/>
      <rect x="-10" y="-10" width="35" height="6"/>
      <rect x="-10" y="10" width="35" height="6"/>
      <rect x="-10" y="-30" width="8" height="25"/>
    </g>
  </g>
  
  <!-- 底部山脉/脉络 -->
  <g transform="translate(200, 280)" fill="none" stroke="url(#goldGrad)" stroke-width="2">
    <path d="M-80,0 Q-60,-20 -40,-10 T0,-15 T40,-10 T80,0" />
    <path d="M-60,15 Q-40,-5 -20,5 T20,5 T60,15" opacity="0.6"/>
  </g>
  
  <!-- 文字：隆脉文化 -->
  <g transform="translate(200, 330)">
    <text x="0" y="0" text-anchor="middle" font-family="SimSun, serif" font-size="28" fill="#764ba2" font-weight="bold">隆脉文化</text>
    <text x="0" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#666" letter-spacing="3">LONGMAI CULTURE</text>
  </g>
  
  <!-- 装饰点 -->
  <circle cx="200" cy="80" r="4" fill="#f39c12"/>
  <circle cx="120" cy="200" r="3" fill="#764ba2" opacity="0.5"/>
  <circle cx="280" cy="200" r="3" fill="#764ba2" opacity="0.5"/>
</svg>
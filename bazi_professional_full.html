                btn.className = 'shichen-btn';
                btn.dataset.hour = SHICHEN_HOURS[idx];
                btn.dataset.index = idx;
                btn.innerHTML = `<span class="sc-icon">${getShichenIcon(idx)}</span>${name}<small>${SHICHEN_HOURS[idx]}-${(SHICHEN_HOURS[idx]+2)%24}点</small>`;
                btn.onclick = () => selectShichen(btn);
                container.appendChild(btn);
            });
        }

        function getShichenIcon(idx) {
            const icons = ['🌙', '🌙', '🌅', '🌅', '☀️', '☀️', '☀️', '🌙', '🌅', '☀️', '🌙', '🌙'];
            return icons[idx] || '•';
        }

        function selectShichen(btn) {
            document.querySelectorAll('.shichen-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedHour = parseInt(btn.dataset.hour);
            selectedHourIndex = parseInt(btn.dataset.index);
            document.getElementById('selectedHour').value = selectedHour;
        }

        // ==================== 八字计算核心 ====================

        function getYearGanZhi(year) {
            const gan = (year - 3) % 10;
            const zhi = (year - 3) % 12;
            return TIANGAN[gan < 0 ? gan + 10 : gan] + DIZHI[zhi < 0 ? zhi + 12 : zhi];
        }

        function getMonthGanZhi(year, month) {
            const yearGan = (year - 3) % 10;
            // 月干：甲己之年丙作首，乙庚之岁戊为头，丙辛必定寻庚起，丁壬壬位顺行流，若问戊癸何处起，甲寅之上好追求
            const startGan = (yearGan === 0 || yearGan === 5) ? 2 : // 甲己 -> 丙(2)
                           (yearGan === 1 || yearGan === 6) ? 4 : // 乙庚 -> 戊(4)
                           (yearGan === 2 || yearGan === 7) ? 6 : // 丙辛 -> 庚(6)
                           (yearGan === 3 || yearGan === 8) ? 8 : // 丁壬 -> 壬(8)
                           0; // 戊癸 -> 甲(0)
            const monthGanIdx = (startGan + month - 1) % 10;
            // 月支：正月为寅，顺推
            const monthZhiIdx = (month + 1) % 12; // 0=子, 1=丑... 3=寅
            return TIANGAN[monthGanIdx] + DIZHI[monthZhiIdx];
        }

        function getDayGanZhi(year, month, day) {
            // 使用基准日计算：1900年1月31日是甲辰日
            const baseDate = new Date(1900, 0, 31);
            const targetDate = new Date(year, month - 1, day);
            const diff = Math.floor((targetDate - baseDate) / (1000 * 60 * 60 * 24));
            const ganIdx = (diff + 10) % 10; // 甲辰日的甲是第10个？实际：甲辰日甲是第0位，基准日甲辰，甲为0
            const zhiIdx = (diff + 4) % 12;  // 辰是第4位
            return TIANGAN[ganIdx < 0 ? ganIdx + 10 : ganIdx] + DIZHI[zhiIdx < 0 ? zhiIdx + 12 : zhiIdx];
        }

        function getHourGanZhi(dayGanZhi, hour) {
            const dayGanIdx = TIANGAN.indexOf(dayGanZhi[0]);
            const shichenIdx = SHICHEN_HOURS.indexOf(hour);
            if (shichenIdx === -1) shichenIdx = 0;
            // 时干：日干顺推
            const hourGanIdx = (dayGanIdx * 2 + shichenIdx) % 10;
            return TIANGAN[hourGanIdx] + DIZHI[shichenIdx];
        }

        function getJieQi(year, month, day) {
            // 简化节气表（精确需要复杂算法）
            const jieqiTable = [
                { month: 1, day: 5, name: '小寒' }, { month: 1, day: 20, name: '大寒' },
                { month: 2, day: 4, name: '立春' }, { month: 2, day: 19, name: '雨水' },
                { month: 3, day: 5, name: '惊蛰' }, { month: 3, day: 20, name: '春分' },
                { month: 4, day: 4, name: '清明' }, { month: 4, day: 20, name: '谷雨' },
                { month: 5, day: 5, name: '立夏' }, { month: 5, day: 21, name: '小满' },
                { month: 6, day: 5, name: '芒种' }, { month: 6, day: 21, name: '夏至' },
                { month: 7, day: 7, name: '小暑' }, { month: 7, day: 23, name: '大暑' },
                { month: 8, day: 7, name: '立秋' }, { month: 8, day: 23, name: '处暑' },
                { month: 9, day: 7, name: '白露' }, { month: 9, day: 23, name: '秋分' },
                { month: 10, day: 8, name: '寒露' }, { month: 10, day: 24, name: '霜降' },
                { month: 11, day: 7, name: '立冬' }, { month: 11, day: 22, name: '小雪' },
                { month: 12, day: 7, name: '大雪' }, { month: 12, day: 22, name: '冬至' }
            ];
            for (let jq of jieqiTable) {
                if (month === jq.month && day >= jq.day) return jq.name;
            }
            // 跨月情况：找上一个节气
            return jieqiTable.find(jq => jq.month === month && jq.day <= day)?.name || jieqiTable[0].name;
        }

        function getShengXiao(year) {
            const idx = (year - 4) % 12;
            return SHENGXIAO[idx < 0 ? idx + 12 : idx];
        }

        // 计算四柱
        function calculateSiZhu(year, month, day, hour) {
            const jieqi = getJieQi(year, month, day);
            // 年柱：立春前是上年
            const lunarYear = (jieqi === '立春' || jieqi === '雨水' || month > 2) ? year : year - 1;
            const yearGanZhi = getYearGanZhi(lunarYear);
            const monthGanZhi = getMonthGanZhi(year, month);
            const dayGanZhi = getDayGanZhi(year, month, day);
            const hourGanZhi = getHourGanZhi(dayGanZhi, hour);
            return { year: yearGanZhi, month: monthGanZhi, day: dayGanZhi, hour: hourGanZhi, jieqi };
        }

        // 计算胎元、命宫、身宫、空亡
        function calculateExtra(year, month, day, sz) {
            // 胎元：月干之合，月支之冲（简化）
            const monthGan = sz.month[0];
            const monthZhi = sz.month[1];
            const monthGanIdx = TIANGAN.indexOf(monthGan);
            const taiYuanGanIdx = (monthGanIdx + 5) % 10; // 假设规则，需精确查表
            const taiYuan = TIANGAN[taiYuanGanIdx] + DIZHI[(DIZHI.indexOf(monthZhi) + 6) % 12];

            // 命宫：根据月支和时支
            const monthZhiIdx = DIZHI.indexOf(monthZhi);
            const hourZhiIdx = DIZHI.indexOf(sz.hour[1]);
            const mingGongIdx = (monthZhiIdx + hourZhiIdx + 2) % 12;
            const mingGong = DIZHI[mingGongIdx];

            // 身宫：日支
            const shenGong = sz.day[1];

            // 空亡：六甲旬空
            const jiaZiIdx = (TIANGAN.indexOf(sz.day[0]) + DIZHI.indexOf(sz.day[1])) % 60;
            const kongWang = ['戌', '亥', '申', '酉', '午', '未', '辰', '巳', '寅', '卯', '子', '丑'][(jiaZiIdx % 12)];

            return { taiYuan, mingGong, shenGong, kongWang };
        }

        // 计算十神
        function getShiShen(riZhu, ganOrZhi) {
            const riGan = riZhu[0];
            const isYang = ['甲', '丙', '戊', '庚', '壬'].includes(riGan);
            const map = isYang ? SHISHEN_YANG[riGan] : SHISHEN_YIN[riGan];
            const chars = ganOrZhi.split('');
            return chars.map(c => WU_XING[c] === WU_XING[riGan] ? (isYang ? '比肩' : '劫财') : // 同我
                          map[TIANGAN.indexOf(c)] || map[DIZHI.indexOf(c)] || '?').join(' ');
        }

        // 计算大运
        function calculateDaYun(year, month, day, hour, sz) {
            // 起运岁数：根据出生日期到下一个节气的天数 / 3
            // 简化：固定3岁起运
            const startAge = 3;
            // 顺排还是逆排：阳年顺，阴年逆
            const yearGan = sz.year[0];
            const isYang = ['甲', '丙', '戊', '庚', '壬'].includes(yearGan);
            const direction = isYang ? 1 : -1; // 1顺，-1逆

            const dayun = [];
            let currentGanIdx = TIANGAN.indexOf(sz.month[0]);
            let currentZhiIdx = DIZHI.indexOf(sz.month[1]);

            for (let i = 0; i < 8; i++) {
                dayun.push(TIANGAN[currentGanIdx] + DIZHI[currentZhiIdx]);
                currentGanIdx = (currentGanIdx + direction + 10) % 10;
                currentZhiIdx = (currentZhiIdx + direction + 12) % 12;
            }

            return { startAge, direction, dayun };
        }

        // 计算流年（当前大运下的12年）
        function calculateLiuNian(dayun, startAge, currentYear) {
            const liunian = [];
            const startIdx = dayun.findIndex((_, idx) => startAge + idx * 10 <= currentYear - startAge);
            const currentDayunIdx = Math.floor((currentYear - startAge) / 10);
            const currentDayun = dayun[currentDayunIdx];

            // 生成当前大运的10年流年
            for (let i = 0; i < 10; i++) {
                const year = currentYear + i - (currentYear % 10) + (currentDayunIdx * 10);
                liunian.push({
                    year: year,
                    ganzhi: TIANGAN[(year - 4) % 10] + DIZHI[(year - 4) % 12],
                    shishen: getShiShen(currentDayun, TIANGAN[(year - 4) % 10] + DIZHI[(year - 4) % 12])
                });
            }
            return liunian;
        }

        // 计算神煞
        function calculateShenSha(sz, sx) {
            const shenList = [];
            const monthZhi = sz.month[1];
            const dayZhi = sz.day[1];
            const hourZhi = sz.hour[1];

            // 天乙贵人：根据日干
            const dayGan = sz.day[0];
            const tiy贵人Map = { '甲': '丑未', '乙': '子申', '丙': '亥酉', '丁': '子申', '戊': '丑未', '己': '申子', '庚': '午寅', '辛': '午寅', '壬': '卯巳', '癸': '卯巳' };
            if (tiy贵人Map[dayGan]?.includes(monthZhi) || tiy贵人Map[dayGan]?.includes(hourZhi)) {
                shenList.push('天乙贵人');
            }

            // 桃花：根据生肖
            const taoHuaZhi = SHEN_SHA['桃花'][sx];
            if ([monthZhi, dayZhi, hourZhi].includes(taoHuaZhi)) {
                shenList.push('桃花');
            }

            // 羊刃：根据日干
            const yangRenZhi = SHEN_SHA['羊刃'][dayGan];
            if ([dayZhi].includes(yangRenZhi)) {
                shenList.push('羊刃');
            }

            // 驿马：根据年支
            const yiMaZhi = SHEN_SHA['驿马'][sx];
            if ([monthZhi, dayZhi, hourZhi].includes(yiMaZhi)) {
                shenList.push('驿马');
            }

            // 华盖：根据日支
            const huaGaiZhi = SHEN_SHA['华盖'][sx];
            if ([dayZhi].includes(huaGaiZhi)) {
                shenList.push('华盖');
            }

            // 灾煞、劫煞、亡神...
            // 简化处理

            return shenList;
        }

        // ==================== 排盘主函数 ====================
        function calculateBazi() {
            try {
                console.log('开始排盘...');

                const year = parseInt(document.getElementById('year').value);
                const month = parseInt(document.getElementById('month').value);
                const day = parseInt(document.getElementById('day').value);

                if (!year || !month || !day) {
                    alert('请选择完整的出生日期');
                    return;
                }

                if (selectedHour < 0) {
                    alert('请选择出生时辰');
                    return;
                }

                // 计算四柱
                const sz = calculateSiZhu(year, month, day, selectedHour);

                // 显示八字四柱
                displayBazi(sz);

                // 计算五行
                const wuxingCount = countWuXing(sz);
                displayWuXing(wuxingCount);

                // 日主
                const rizhu = sz.day[0];
                document.getElementById('rizhu').innerHTML = `日主：<span style="font-size:2rem;color:#FF6B35;">${rizhu}（${WU_XING[rizhu]}）</span>`;

                // 十神
                const shishen = calculateShiShen(sz);
                displayShiShen(shishen);

                // 地支藏干
                displayCangGan(sz);

                // 节气与运数
                displayQiYun(sz, year, month, day);

                // 胎元、命宫、身宫、空亡
                const extra = calculateExtra(year, month, day, sz);
                displayExtra(extra);

                // 大运
                const dayun = calculateDaYun(year, month, day, selectedHour, sz);
                displayDaYun(dayun, year, month, day);

                // 流年
                const liunian = calculateLiuNian(dayun.dayun, dayun.startAge, year);
                displayLiuNian(liunian);

                // 神煞
                const shenSha = calculateShenSha(sz, getShengXiao(year));
                displayShenSha(shenSha);

                // 显示结果
                document.getElementById('result-card').classList.add('show');
                document.getElementById('result-card').scrollIntoView({ behavior: 'smooth' });

            } catch (error) {
                console.error('八字计算错误:', error);
                alert('计算失败：' + error.message);
            }
        }

        function calculateShiShen(sz) {
            const riGan = sz.day[0];
            const isYang = ['甲', '丙', '戊', '庚', '壬'].includes(riGan);
            const shenMap = isYang ? SHISHEN_YANG[riGan] : SHISHEN_YIN[riGan];
            const result = {};
            ['年', '月', '日', '时'].forEach((label, idx) => {
                const gan = ['年','月','日','时'][idx] + '干';
                const zhi = ['年','月','日','时'][idx] + '支';
                const ganChar = sz.year[0] + sz.month[0] + sz.day[0] + sz.hour[0];
                const zhiChar = sz.year[1] + sz.month[1] + sz.day[1] + sz.hour[1];
                result[gan] = shenMap[TIANGAN.indexOf(ganChar[idx])] || '?';
                result[zhi] = shenMap[DIZHI.indexOf(zhiChar[idx])] || '?';
            });
            return result;
        }

        function displayShiShen(shishen) {
            const container = document.getElementById('shishen-box');
            const labels = ['年干', '年支', '月干', '月支', '日干', '日支', '时干', '时支'];
            let html = '<div class="shishen-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;">';
            labels.forEach((label, i) => {
                const val = Object.values(shishen)[i];
                html += `<div class="shishen-item"><span class="shishen-name">${label}</span><span>${val}</span></div>`;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function displayCangGan(sz) {
            const container = document.getElementById('canggan');
            let html = '';
            ['年支', '月支', '日支', '时支'].forEach((label, i) => {
                const zhi = sz.year[1] + sz.month[1] + sz.day[1] + sz.hour[1];
                const cang = CANGAN[zhi[i]];
                html += `<div style="margin-bottom:8px;"><strong>${label}（${zhi[i]}）</strong>：`;
                cang.forEach((gan, idx) => {
                    html += `<span class="canggan-item">${gan}（${WU_XING[gan]}）</span>`;
                });
                html += '</div>';
            });
            container.innerHTML = html;
        }

        function displayQiYun(sz, year, month, day) {
            const container = document.getElementById('qiyun');
            const daYun = calculateDaYun(year, month, day, selectedHour, sz);
            let html = `<p>节气：<strong>${sz.jieqi}</strong></p>`;
            html += `<p>起运：${daYun.startAge}岁起运（${daYun.direction === 1 ? '顺排' : '逆排'}）</p>`;
            html += `<p>大运：每十年一换</p>`;
            container.innerHTML = html;
        }

        function displayDaYun(dayun, year, month, day) {
            const table = document.getElementById('dayun-table');
            let html = '<tr><th>起运岁数</th><th>大运干支</th><th>天干五行</th><th>地支五行</th></tr>';
            for (let i = 0; i < dayun.dayun.length; i++) {
                const age = dayun.startAge + i * 10;
                const gy = dayun.dayun[i];
                const gan = gy[0], zhi = gy[1];
                html += `<tr><td>${age}岁起</td><td>${gy}</td><td>${WU_XING[gan]}</td><td>${WU_XING[zhi]}</td></tr>`;
            }
            table.innerHTML = html;
        }

        function displayLiuNian(liunian) {
            const table = document.getElementById('liunian-table');
            let html = '<tr><th>流年</th><th>干支</th><th>天干五行</th><th>地支五行</th><th>十神</th></tr>';
            liunian.forEach(item => {
                html += `<tr><td>${item.year}年</td><td>${item.ganzhi}</td><td>${WU_XING[item.ganzhi[0]]}</td><td>${WU_XING[item.ganzhi[1]]}</td><td>${item.shishen}</td></tr>`;
            });
            table.innerHTML = html;
        }

        function displayShenSha(shenList) {
            const grid = document.getElementById('shensha-grid');
            grid.innerHTML = shenList.length ? shenList.map(s => `<div class="shensha-item"><div class="shensha-name">${s}</div></div>`).join('') : '<div class="shensha-item">无</div>';
        }

        function displayExtra(extra) {
            const container = document.getElementById('extra-info');
            container.innerHTML = `
                <p>胎元：<strong>${extra.taiYuan}</strong>（${WU_XING[extra.taiYuan[0]]}${WU_XING[extra.taiYuan[1]]}）</p>
                <p>命宫：<strong>${extra.mingGong}</strong>（${WU_XING[extra.mingGong] || '土'}）</p>
                <p>身宫：<strong>${extra.shenGong}</strong>（${WU_XING[extra.shenGong] || '土'}）</p>
                <p>空亡：<strong>${extra.kongWang}</strong></p>
            `;
        }

        function displayBazi(sz) {
            const grid = document.getElementById('bazi-grid');
            grid.innerHTML = '';
            const order = [
                { label: '年柱', val: sz.year },
                { label: '月柱', val: sz.month },
                { label: '日柱', val: sz.day },
                { label: '时柱', val: sz.hour }
            ];
            order.forEach(item => {
                const div = document.createElement('div');
                div.className = 'tiangan';
                div.innerHTML = `<strong>${item.label}</strong><br>${item.val[0]}<br><small>${WU_XING[item.val[0]]}</small>`;
                grid.appendChild(div);

                const div2 = document.createElement('div');
                div2.className = 'dizhi';
                div2.innerHTML = `&nbsp;`;
                grid.appendChild(div2);

                const div3 = document.createElement('div');
                div3.className = 'dizhi';
                div3.innerHTML = `<strong>${item.val[1]}</strong><br><small>${WU_XING[item.val[1]]}</small>`;
                grid.appendChild(div3);

                const div4 = document.createElement('div');
                div4.className = 'wuxing';
                div4.innerHTML = `${WU_XING[item.val[0]]}${WU_XING[item.val[1]]}`;
                grid.appendChild(div4);
            });
        }

        function countWuXing(sz) {
            const count = { '木': 0, '火': 0, '土': 0, '金': 0, '水': 0 };
            const four = [sz.year, sz.month, sz.day, sz.hour];
            four.forEach(pair => {
                count[WU_XING[pair[0]]]++;
                count[WU_XING[pair[1]]]++;
            });
            return count;
        }

        function displayWuXing(count) {
            const grid = document.getElementById('wuxing-grid');
            grid.innerHTML = '';
            for (const [wx, num] of Object.entries(count)) {
                const div = document.createElement('div');
                div.className = 'wuxing';
                div.innerHTML = `<strong>${wx}</strong><br>${num} 次`;
                grid.appendChild(div);
            }
        }

        function getJieQiDate(year, month) {
            const table = [
                { month: 1, day: 5, name: '小寒' }, { month: 1, day: 20, name: '大寒' },
                { month: 2, day: 4, name: '立春' }, { month: 2, day: 19, name: '雨水' },
                { month: 3, day: 5, name: '惊蛰' }, { month: 3, day: 20, name: '春分' },
                { month: 4, day: 4, name: '清明' }, { month: 4, day: 20, name: '谷雨' },
                { month: 5, day: 5, name: '立夏' }, { month: 5, day: 21, name: '小满' },
                { month: 6, day: 5, name: '芒种' }, { month: 6, day: 21, name: '夏至' },
                { month: 7, day: 7, name: '小暑' }, { month: 7, day: 23, name: '大暑' },
                { month: 8, day: 7, name: '立秋' }, { month: 8, day: 23, name: '处暑' },
                { month: 9, day: 7, name: '白露' }, { month: 9, day: 23, name: '秋分' },
                { month: 10, day: 8, name: '寒露' }, { month: 10, day: 24, name: '霜降' },
                { month: 11, day: 7, name: '立冬' }, { month: 11, day: 22, name: '小雪' },
                { month: 12, day: 7, name: '大雪' }, { month: 12, day: 22, name: '冬至' }
            ];
            return table.filter(item => item.month === month);
        }

        // 初始化（不再需要populateSelects）
        init();
    </script>

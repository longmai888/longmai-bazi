<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙脉文化 · 登录</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mobile.css">
    <style>
        .auth-container {
            max-width: 500px;
            margin: 50px auto;
            padding: 40px;
            background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(155, 123, 199, 0.3);
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .auth-title {
            text-align: center;
            font-size: 2rem;
            color: #f5b041;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.85);
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
        }
        .form-group input:focus {
            border-color: #f5b041;
            outline: none;
        }
        .login-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
            font-size: 0.9rem;
        }
        .login-options a {
            color: #f5b041;
            text-decoration: none;
        }
        .btn-primary {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1.1rem;
            cursor: pointer;
            margin-top: 20px;
        }
        .social-login {
            margin-top: 30px;
            text-align: center;
        }
        .social-login-title {
            color: #999;
            margin-bottom: 15px;
            position: relative;
        }
        .social-login-title::before,
        .social-login-title::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 80px;
            height: 1px;
            background: #ddd;
        }
        .social-login-title::before {
            left: 0;
        }
        .social-login-title::after {
            right: 0;
        }
        .social-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #ddd;
            background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(155, 123, 199, 0.3);
            cursor: pointer;
            font-size: 1.5rem;
            transition: all 0.3s;
        }
        .social-btn:hover {
            transform: scale(1.1);
        }
        .auth-links {
            text-align: center;
            margin-top: 20px;
        }
        .auth-links a {
            color: #f5b041;
            text-decoration: none;
        }
        .agreement-notice {
            margin-top: 20px;
            padding: 15px;
            background: #f5f7fa;
            border-radius: 10px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
        }
        .agreement-notice a {
            color: #f5b041;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1 class="auth-title">🐉 欢迎回来</h1>
        
        <form id="loginForm" onsubmit="return handleLogin(event)">
            <div class="form-group">
                <label>手机号码</label>
                <input type="tel" id="phone" placeholder="请输入手机号? maxlength="11" required>
            </div>
            
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密? required>
            </div>
            
            <div class="login-options">
                <label>
                    <input type="checkbox" id="remember"> 记住?                </label>
                <a href="forgot_password.html">忘记密码</a>
            </div>
            
            <button type="submit" class="btn-primary">登录</button>
        </form>
        
        <div class="social-login">
            <div class="social-login-title">其他登录方式</div>
            <div class="social-buttons">
                <button class="social-btn" onclick="wechatLogin()" title="微信登录">💬</button>
                <button class="social-btn" onclick="qqLogin()" title="QQ登录">🐧</button>
            </div>
        </div>
        
        <div class="agreement-notice">
            登录即表示您同意 <a href="user_agreement.html" target="_blank">《用户协议</a>?            <a href="privacy_policy.html" target="_blank">《隐私政策</a> ?
            <a href="disclaimer.html" target="_blank">《免责声明</a>?            如您未注册，登录将自动创建账号?        </div>
        
        <div class="auth-links">
            <p>还没有账号？<a href="register.html">立即注册</a></p>
        </div>
    </div>
    
    <script>
        // 处理登录
        function handleLogin(e) {
            e.preventDefault();
            
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            
            // 验证（演示）
            const userData = JSON.parse(localStorage.getItem('userData') || '{}');
            
            if (userData.phone === phone && userData.password === password) {
                // 登录成功
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('currentUser', phone);
                
                if (remember) {
                    localStorage.setItem('rememberUser', phone);
                }
                
                // 记录登录日志
                const loginLog = {
                    phone: phone,
                    loginTime: new Date().toISOString(),
                    ip: '用户IP地址',
                    device: navigator.userAgent,
                    type: 'password_login'
                };
                
                // 保存登录记录
                let loginHistory = JSON.parse(localStorage.getItem('loginHistory') || '[]');
                loginHistory.push(loginLog);
                localStorage.setItem('loginHistory', JSON.stringify(loginHistory));
                
                alert('登录成功?);
                window.location.href = 'index.html';
            } else {
                alert('手机号或密码错误?);
            }
            
            return false;
        }
        
        // 微信登录
        function wechatLogin() {
            alert('微信登录功能开发中...');
        }
        
        // QQ登录
        function qqLogin() {
            alert('QQ登录功能开发中...');
        }
        
        // 页面加载时检查记住的用户
        window.onload = function() {
            const rememberedUser = localStorage.getItem('rememberUser');
            if (rememberedUser) {
                document.getElementById('phone').value = rememberedUser;
                document.getElementById('remember').checked = true;
            }
        };
    </script>

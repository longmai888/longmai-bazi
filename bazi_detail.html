    <script>
        // 天干
        const tianGan = ['甲', '乙', '丙', '丁', '戊', '己', '庚', '辛', '壬', '癸'];
        
        // 地支
        const diZhi = ['子', '丑', '寅', '卯', '辰', '巳', '午', '未', '申', '酉', '戌', '亥'];
        
        // 地支藏干
        const diZhiCangGan = {
            '子': ['癸'],
            '丑': ['己', '癸', '辛'],
            '寅': ['甲', '丙', '戊'],
            '卯': ['乙'],
            '辰': ['戊', '乙', '癸'],
            '巳': ['丙', '庚', '戊'],
            '午': ['丁', '己'],
            '未': ['己', '丁', '乙'],
            '申': ['庚', '壬', '戊'],
            '酉': ['辛'],
            '戌': ['戊', '辛', '丁'],
            '亥': ['壬', '甲']
        };
        
        // 纳音五行
        const naYinTable = {
            '甲子': '海中金', '乙丑': '海中金',
            '丙寅': '炉中火', '丁卯': '炉中火',
            '戊辰': '大林木', '己巳': '大林木',
            '庚午': '路旁土', '辛未': '路旁土',
            '壬申': '剑锋金', '癸酉': '剑锋金',
            '甲戌': '山头火', '乙亥': '山头火',
            '丙子': '涧下水', '丁丑': '涧下水',
            '戊寅': '城头土', '己卯': '城头土',
            '庚辰': '白蜡金', '辛巳': '白蜡金',
            '壬午': '杨柳木', '癸未': '杨柳木',
            '甲申': '泉中水', '乙酉': '泉中水',
            '丙戌': '屋上土', '丁亥': '屋上土',
            '戊子': '霹雳火', '己丑': '霹雳火',
            '庚寅': '松柏木', '辛卯': '松柏木',
            '壬辰': '长流水', '癸巳': '长流水',
            '甲午': '沙中金', '乙未': '沙中金',
            '丙申': '山下火', '丁酉': '山下火',
            '戊戌': '平地木', '己亥': '平地木',
            '庚子': '壁上土', '辛丑': '壁上土',
            '壬寅': '金箔金', '癸卯': '金箔金',
            '甲辰': '覆灯火', '乙巳': '覆灯火',
            '丙午': '天河水', '丁未': '天河水',
            '戊申': '大驿土', '己酉': '大驿土',
            '庚戌': '钗钏金', '辛亥': '钗钏金',
            '壬子': '桑柘木', '癸丑': '桑柘木',
            '甲寅': '大溪水', '乙卯': '大溪水',
            '丙辰': '沙中土', '丁巳': '沙中土',
            '戊午': '天上火', '己未': '天上火',
            '庚申': '石榴木', '辛酉': '石榴木',
            '壬戌': '大海水', '癸亥': '大海水'
        };
        
        // 五行颜色
        const wuxingColors = {
            '金': '#FFD700',
            '木': '#228B22',
            '水': '#1E90FF',
            '火': '#FF4500',
            '土': '#8B4513'
        };
        
        // 天干五行
        const ganWuxing = {
            '甲': '木', '乙': '木',
            '丙': '火', '丁': '火',
            '戊': '土', '己': '土',
            '庚': '金', '辛': '金',
            '壬': '水', '癸': '水'
        };
        
        // 地支五行
        const zhiWuxing = {
            '子': '水', '丑': '土', '寅': '木', '卯': '木',
            '辰': '土', '巳': '火', '午': '火', '未': '土',
            '申': '金', '酉': '金', '戌': '土', '亥': '水'
        };
        
        // 计算八字
        function calculateBazi() {
            const birthDate = document.getElementById('birthDate').value;
            const birthTime = document.getElementById('birthTime').value;
            
            if (!birthDate || !birthTime) {
                alert('请填写完整的出生日期和时间');
                return;
            }
            
            const date = new Date(birthDate + 'T' + birthTime);
            const year = date.getFullYear();
            const month = date.getMonth() + 1;
            const day = date.getDate();
            const hour = date.getHours();
            
            // 使用 lunar-javascript 库进行转换
            const lunar = Lunar.fromDate(date);
            const lunarYear = lunar.getYear();
            const lunarMonth = lunar.getMonth();
            const lunarDay = lunar.getDay();
            
            // 显示农历信息
            const lunarInfo = document.getElementById('lunarInfo');
            lunarInfo.innerHTML = `
                <strong>农历：</strong>${lunarYear}年${lunarMonth}月${lunarDay}日 ${lunar.getYearInGanZhi()}年<br>
                <strong>生肖：</strong>${lunar.getYearShengXiao()}<br>
                <strong>节气：</strong>${lunar.getJieQi() || '无'}
            `;
            
            // 计算四柱
            const yearGZ = lunar.getYearInGanZhi();
            const monthGZ = lunar.getMonthInGanZhi();
            const dayGZ = lunar.getDayInGanZhi();
            const hourGZ = getHourGanZhi(dayGZ.charAt(0), hour);
            
            // 显示八字
            document.getElementById('yearGan').textContent = yearGZ.charAt(0);
            document.getElementById('yearZhi').textContent = yearGZ.charAt(1);
            document.getElementById('monthGan').textContent = monthGZ.charAt(0);
            document.getElementById('monthZhi').textContent = monthGZ.charAt(1);
            document.getElementById('dayGan').textContent = dayGZ.charAt(0);
            document.getElementById('dayZhi').textContent = dayGZ.charAt(1);
            document.getElementById('hourGan').textContent = hourGZ.charAt(0);
            document.getElementById('hourZhi').textContent = hourGZ.charAt(1);
            
            // 显示详细信息
            showDetails(yearGZ, monthGZ, dayGZ, hourGZ);
            
            // 显示结果区域
            document.getElementById('resultSection').classList.add('active');
            
            // 滚动到结果
            document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
        }
        
        // 计算时柱
        function getHourGanZhi(dayGan, hour) {
            const hourZhiIndex = Math.floor((hour + 1) / 2) % 12;
            const hourZhi = diZhi[hourZhiIndex];
            
            // 时干计算：日干推时干
            const dayGanIndex = tianGan.indexOf(dayGan);
            const hourGanIndex = (dayGanIndex * 2 + hourZhiIndex) % 10;
            const hourGan = tianGan[hourGanIndex];
            
            return hourGan + hourZhi;
        }
        
        // 显示详细信息
        function showDetails(yearGZ, monthGZ, dayGZ, hourGZ) {
            // 十神分析（简化版）
            const dayGan = dayGZ.charAt(0);
            const shishenText = `
                <p><strong>日主：</strong>${dayGan}（${ganWuxing[dayGan]}）</p>
                <p><strong>年柱：</strong>${yearGZ} - ${getShiShen(dayGan, yearGZ.charAt(0))}</p>
                <p><strong>月柱：</strong>${monthGZ} - ${getShiShen(dayGan, monthGZ.charAt(0))}</p>
                <p><strong>时柱：</strong>${hourGZ} - ${getShiShen(dayGan, hourGZ.charAt(0))}</p>
            `;
            document.getElementById('shishenAnalysis').innerHTML = shishenText;
            
            // 五行分析
            const allGanZhi = yearGZ + monthGZ + dayGZ + hourGZ;
            const wuxingCount = { '金': 0, '木': 0, '水': 0, '火': 0, '土': 0 };
            
            for (let char of allGanZhi) {
                if (ganWuxing[char]) wuxingCount[ganWuxing[char]]++;
                if (zhiWuxing[char]) wuxingCount[zhiWuxing[char]]++;
            }
            
            let wuxingText = '<p><strong>五行统计：</strong></p>';
            for (let [wx, count] of Object.entries(wuxingCount)) {
                if (count > 0) {
                    wuxingText += `<p><span style="color: ${wuxingColors[wx]}">●</span> ${wx}：${count}个</p>`;
                }
            }
            document.getElementById('wuxingAnalysis').innerHTML = wuxingText;
            
            // 纳音五行
            const nayinText = `
                <p><strong>年柱纳音：</strong>${naYinTable[yearGZ] || '未知'}</p>
                <p><strong>月柱纳音：</strong>${naYinTable[monthGZ] || '未知'}</p>
                <p><strong>日柱纳音：</strong>${naYinTable[dayGZ] || '未知'}</p>
                <p><strong>时柱纳音：</strong>${naYinTable[hourGZ] || '未知'}</p>
            `;
            document.getElementById('nayinAnalysis').innerHTML = nayinText;
            
            // 地支藏干
            const cangganText = `
                <p><strong>年支${yearGZ.charAt(1)}藏：</strong>${diZhiCangGan[yearGZ.charAt(1)].join('、')}</p>
                <p><strong>月支${monthGZ.charAt(1)}藏：</strong>${diZhiCangGan[monthGZ.charAt(1)].join('、')}</p>
                <p><strong>日支${dayGZ.charAt(1)}藏：</strong>${diZhiCangGan[dayGZ.charAt(1)].join('、')}</p>
                <p><strong>时支${hourGZ.charAt(1)}藏：</strong>${diZhiCangGan[hourGZ.charAt(1)].join('、')}</p>
            `;
            document.getElementById('cangganAnalysis').innerHTML = cangganText;
        }
        
        // 获取十神（简化版）
        function getShiShen(dayGan, targetGan) {
            if (dayGan === targetGan) return '比肩';
            
            const dayIndex = tianGan.indexOf(dayGan);
            const targetIndex = tianGan.indexOf(targetGan);
            const dayWuxing = ganWuxing[dayGan];
            const targetWuxing = ganWuxing[targetGan];
            
            // 同性为比肩/劫财/食神/伤官/偏财/正财/七杀/正官/偏印/正印
            const isSameYinYang = (dayIndex % 2) === (targetIndex % 2);
            
            // 五行生克关系
            const wuxingRelation = {
                '金': { '生': '水', '克': '木', '被生': '土', '被克': '火' },
                '木': { '生': '火', '克': '土', '被生': '水', '被克': '金' },
                '水': { '生': '木', '克': '火', '被生': '金', '被克': '土' },
                '火': { '生': '土', '克': '金', '被生': '木', '被克': '水' },
                '土': { '生': '金', '克': '水', '被生': '火', '被克': '木' }
            };
            
            if (targetWuxing === wuxingRelation[dayWuxing]['被生']) {
                return isSameYinYang ? '偏印' : '正印';
            } else if (targetWuxing === wuxingRelation[dayWuxing]['生']) {
                return isSameYinYang ? '食神' : '伤官';
            } else if (targetWuxing === wuxingRelation[dayWuxing]['被克']) {
                return isSameYinYang ? '偏财' : '正财';
            } else if (targetWuxing === wuxingRelation[dayWuxing]['克']) {
                return isSameYinYang ? '七杀' : '正官';
            } else {
                return isSameYinYang ? '比肩' : '劫财';
            }
        }
    </script>
</body>

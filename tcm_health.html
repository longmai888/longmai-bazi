    <script>
        // 初始化年份选择
        const yearSelect = document.getElementById('year');
        for (let i = 2026; i >= 1920; i--) {
            yearSelect.innerHTML += `<option value="${i}">${i}?/option>`;
        }

        // 初始化日期选择
        const daySelect = document.getElementById('day');
        for (let i = 1; i <= 31; i++) {
            daySelect.innerHTML += `<option value="${i}">${i}?/option>`;
        }

        // 9种体质类?        const constitutions = {
            balanced: {
                name: '平和?,
                class: 'type-balanced',
                description: '阴阳气血调和，体态适中，面色红润，精力充沛',
                features: ['体态适中', '面色红润', '精力充沛', '睡眠良好', '二便正常'],
                advice: ['保持规律作息', '饮食均衡', '适度运动', '心态平?]
            },
            qiDeficiency: {
                name: '气虚?,
                class: 'type-qi-deficiency',
                description: '元气不足，疲乏无力，气短懒言',
                features: ['容易疲劳', '气短懒言', '声音低弱', '易出?, '易感?],
                advice: ['多吃益气食物', '避免过度劳累', '适度运动', '早睡早起']
            },
            yangDeficiency: {
                name: '阳虚?,
                class: 'type-yang-deficiency',
                description: '阳气不足，畏寒怕冷，手足不?,
                features: ['畏寒怕冷', '手足不温', '喜热饮食', '精神不振', '睡眠偏多'],
                advice: ['多吃温阳食物', '注意保暖', '适当晒太?, '避免生冷']
            },
            yinDeficiency: {

            },
            dampnessHeat: {
                name: '湿热?,
                class: 'type-dampness-heat',

                advice: ['清淡饮食', '多吃清热利湿食物', '避免熬夜', '保持皮肤清洁']
            },
            bloodStasis: {

            },

            },
            special: {

                features: ['易过?, '易哮?, '易荨麻疹', '皮肤易起?, '季节变化敏感'],
                advice: ['避免过敏?, '增强体质', '注意环境卫生', '饮食清淡']
            }
        };

        function analyzeHealth() {
            const year = document.getElementById('year').value;
            const month = document.getElementById('month').value;
            const day = document.getElementById('day').value;
            const hour = document.getElementById('hour').value;

            if (!year || !month || !day || !hour) {
                alert('请填写完整的出生信息');
                return;
            }

            const birthDate = new Date(year, month - 1, day);
            const dayOfYear = Math.floor((birthDate - new Date(year, 0, 0)) / 1000 / 60 / 60 / 24);
            
            const constitutionKeys = Object.keys(constitutions);
            const constitutionIndex = (dayOfYear + parseInt(hour)) % 9;
            const primaryType = constitutionKeys[constitutionIndex];
            const secondaryType = constitutionKeys[(constitutionIndex + 3) % 9];

            displayResults(primaryType, secondaryType);
        }

        function displayResults(primaryType, secondaryType) {
            const resultSection = document.getElementById('resultSection');
            resultSection.style.display = 'block';

            const primary = constitutions[primaryType];
            const secondary = constitutions[secondaryType];
            
            document.getElementById('constitutionResult').innerHTML = `
                <p style="margin-bottom: 15px;"><strong>主要体质?/strong></p>
                <span class="constitution-type ${primary.class}">${primary.name}</span>
                <p style="margin: 15px 0;">${primary.description}</p>
                <p style="margin-bottom: 15px;"><strong>次要体质?/strong></p>
                <span class="constitution-type ${secondary.class}">${secondary.name}</span>
                <div style="margin-top: 20px;">
                    <h4 style="margin-bottom: 10px;">体质特征?/h4>
                    <ul style="list-style: none; padding: 0;">
                        ${primary.features.map(f => `<li style="padding: 5px 0;">?${f}</li>`).join('')}
                    </ul>
                </div>
            `;

            const wuxing = ['?, '?, '?, '?, '?];
            const wuxingColors = ['#90EE90', '#FF6B6B', '#DEB887', '#FFD700', '#87CEEB'];
            const wuxingScores = wuxing.map(() => Math.floor(Math.random() * 40) + 30);
            
            document.getElementById('wuxingAnalysis').innerHTML = `
                <div style="display: flex; justify-content: space-around; margin-top: 15px;">
                    ${wuxing.map((w, i) => `
                        <div style="text-align: center;">
                            <div style="width: 60px; height: ${wuxingScores[i]}px; background: ${wuxingColors[i]}; border-radius: 5px; margin: 0 auto; display: flex; align-items: flex-end; justify-content: center; color: white; font-weight: bold; padding-bottom: 5px;">${wuxingScores[i]}%</div>
                            <p style="margin-top: 10px; font-weight: bold;">${w}</p>
                        </div>
                    `).join('')}
                </div>
            `;

            document.getElementById('healthAdvice').innerHTML = `
                <h4>针对${primary.name}的养生建议：</h4>
                <ul>
                    ${primary.advice.map(a => `<li>${a}</li>`).join('')}
                </ul>
            `;

            document.getElementById('medicineGrid').innerHTML = `
                <div class="medicine-card">
                    <h4>黄芪</h4>
                    <p><strong>功效?/strong>补气升阳，益卫固?/p>
                    <p><strong>用法?/strong>泡水、炖?/p>
                </div>
                <div class="medicine-card">
                    <h4>枸杞</h4>
                    <p><strong>功效?/strong>滋补肝肾，益精明?/p>
                    <p><strong>用法?/strong>泡水、煲?/p>
                </div>
                <div class="medicine-card">
                    <h4>山药</h4>
                    <p><strong>功效?/strong>补脾养胃，生津益?/p>
                    <p><strong>用法?/strong>煮粥、炖?/p>
                </div>
            `;

            document.getElementById('seasonalTips').innerHTML = `
                <p><strong>当前季节养生重点?/strong></p>
                <ul style="margin-top: 10px; list-style: none;">
                    <li style="padding: 5px 0;">?饮食清淡，少食油?/li>
                    <li style="padding: 5px 0;">?早睡早起，保证睡?/li>
                    <li style="padding: 5px 0;">?适度运动，增强体?/li>
                </ul>
            `;

            document.getElementById('healthWarning').innerHTML = `
                <p><strong>近期健康提醒?/strong></p>
                <ul style="margin-top: 10px;">
                    <li>注意${primary.name}相关的健康问?/li>
                    <li>大运流年变化期间，建议定期体检</li>
                    <li>情绪波动较大时，及时调整心?/li>
                </ul>
            `;

            resultSection.scrollIntoView({ behavior: 'smooth' });
        }

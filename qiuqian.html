<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线求签 - 龙脉文化</title>
    <meta name="description" content="龙脉文化在线求签，观音灵签、月老灵签、财神灵签，心诚则灵。">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-brand">
                <img src="images/logo.svg" alt="龙脉文化" class="navbar-logo">
                <span>龙脉文化</span>
            </a>
            <ul class="navbar-menu">
                <li class="navbar-item"><a href="index.html" class="navbar-link">首页</a></li>
                <li class="navbar-item"><a href="bazi_professional.html" class="navbar-link">八字排盘</a></li>
                <li class="navbar-item"><a href="qiuqian.html" class="navbar-link">在线求签</a></li>
                <li class="navbar-item"><a href="articles.html" class="navbar-link">文章</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <div class="card">
            <h1>在线求签</h1>
            <p style="text-align: center; color: rgba(255,255,255,0.8); margin-bottom: 30px;">
                心诚则灵，默念所求，点击求签
            </p>
            
            <div class="grid" style="margin: 30px 0;">
                <div class="service-card" onclick="qiuqian('guanyin')">
                    <div class="service-icon">🙏</div>
                    <div class="service-title">观音灵签</div>
                    <div class="service-desc">求平安、求健康、求子嗣</div>
                </div>
                
                <div class="service-card" onclick="qiuqian('yuelao')">
                    <div class="service-icon">💕</div>
                    <div class="service-title">月老灵签</div>
                    <div class="service-desc">求姻缘、求婚姻、求桃花</div>
                </div>
                
                <div class="service-card" onclick="qiuqian('caishen')">
                    <div class="service-icon">💰</div>
                    <div class="service-title">财神灵签</div>
                    <div class="service-desc">求财運、求事业、求投资</div>
                </div>
            </div>
            
            <div id="qiuqian-result" style="margin-top: 30px; display: none;">
                <div class="result-box">
                    <div class="result-title">🎋 签文</div>
                    <div id="qian-number" style="text-align: center; font-size: 1.5rem; color: #f39c12; margin-bottom: 15px;"></div>
                    <div id="qian-content" style="text-align: center; color: rgba(255,255,255,0.9); line-height: 2;"></div>
                </div>
            </div>
            
            <div style="margin-top: 40px; padding: 20px; background: rgba(243, 156, 18, 0.1); border-radius: 10px;">
                <h3 style="color: #f39c12;">📞 详细解签</h3>
                <p style="color: rgba(255,255,255,0.8);">
                    如需专业大师详细解签，请联系：<br>
                    QQ：1614194452<br>
                    网站：https://longmai888.github.io/longmai-bazi/
                </p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p class="footer-contact">📞 QQ咨询：1614194452</p>
            <p class="footer-copyright">© 2026 龙脉文化 - 传承千年智慧</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        var qianwen = {
            'guanyin': [
                {number: '第一签', content: '开天辟地作良缘，吉日良时万物全。若得此签非小可，人行中正帝王宣。', jiexiong: '上上签'},
                {number: '第二签', content: '鲸鱼未变守江河，不可升腾更望高。异日峥嵘身变化，许君一跃跳龙门。', jiexiong: '中签'},
                {number: '第三签', content: '冲风冒雨去还归，役役劳身似燕儿。衔得泥来呈旧垒，可怜家破被人欺。', jiexiong: '下签'}
            ],
            'yuelao': [
                {number: '第一签', content: '关关雎鸠在河之洲，窈窕淑女君子好逑。', jiexiong: '上上签'},
                {number: '第二签', content: '相思相见知何日，此时此夜难为情。', jiexiong: '中签'},
                {number: '第三签', content: '落花有意随流水，流水无情恋落花。', jiexiong: '下签'}
            ],
            'caishen': [
                {number: '第一签', content: '生意兴隆通四海，财源茂盛达三江。', jiexiong: '上上签'},
                {number: '第二签', content: '求财得利宜谨慎，莫贪横财惹祸端。', jiexiong: '中签'},
                {number: '第三签', content: '财来财去如流水，守成不易创业难。', jiexiong: '下签'}
            ]
        };
        
        function qiuqian(type) {
            var qians = qianwen[type];
            var randomIndex = Math.floor(Math.random() * qians.length);
            var qian = qians[randomIndex];
            
            document.getElementById('qian-number').textContent = qian.number + ' ' + qian.jiexiong;
            document.getElementById('qian-content').innerHTML = qian.content.replace(/。/g, '。<br>');
            document.getElementById('qiuqian-result').style.display = 'block';
            
            showToast('求签完成！', 'success');
        }
    </script>
</body>
</html>

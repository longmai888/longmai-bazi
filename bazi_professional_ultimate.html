        body {

            background-attachment: fixed;
            min-height: 100vh;
            line-height: 1.6;
            color: #fff;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .hero h1 {
            margin: 0 0 10px;
            font-size: 2.5rem;
            color: #FFD700;
        }

        .hero p {
            margin: 0;
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .form-section {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(243, 156, 18, 0.3);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #FFD700;
        }

        .form-group select,
        .form-group input {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(243, 156, 18, 0.4);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: #FF6B35;
        }

        .shichen-btns {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .shichen-btn {
            padding: 15px 5px;
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(243, 156, 18, 0.4);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            color: #fff;
        }

        .shichen-btn:hover {
            background: rgba(255,255,255,0.15);
            border-color: #FF6B35;
        }

        .shichen-btn.active {
            background: linear-gradient(135deg, #FF6B35, #FF8C00);
            border-color: #FF6B35;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.4);

            font-size: 1.5rem;
            display: block;
            margin-bottom: 5px;
        }

        .shichen-btn small {

            opacity: 0.8;

            border-radius: 8px;

            margin-top: 10px;

        }

            border: 1px solid rgba(243, 156, 18, 0.3);

            border-radius: 8px;

            border-radius: 8px;
            padding: 15px;

            background: rgba(255,255,255,0.1);

            padding: 10px;
            text-align: center;
            border: 1px solid rgba(243, 156, 18, 0.3);

            color: #FFD700;
        }

        }

            gap: 10px;
            margin-top: 15px;
        }

        .shensha-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(243, 156, 18, 0.2);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            font-size: 0.85rem;
        }

        .shensha-name {
            color: #FF6B35;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .changsheng-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-top: 15px;
        }

        .changsheng-item {
            background: rgba(255,255,255,0.05);

            border-radius: 8px;
            padding: 10px;
            text-align: center;

        .footer {

            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);

        }

            }

        // 十神映射（阴日干）
        const SHISHEN_YIN = {

        // 地支藏干

        // 神煞定义（简化版，试用版有更完整逻辑）
        const SHEN_SHA = {

        // 生肖映射
        const SHENGXIAO = ['鼠', '牛', '虎', '兔', '龙', '蛇', '马', '羊', '猴', '鸡', '狗', '猪'];

        // ==================== 初始化 ====================
        let selectedHour = -1;

        function getShichenIcon(idx) {

        function selectShichen(btn) {
            document.querySelectorAll('.shichen-btn').forEach(b => b.classList.remove('active'));

        // ==================== 八字计算核心 ====================

        function getYearGanZhi(year) {
            const gan = (year - 3) % 10;
            const zhi = (year - 3) % 12;
            return TIANGAN[gan < 0 ? gan + 10 : gan] + DIZHI[zhi < 0 ? zhi + 12 : zhi];
        }

        function getMonthGanZhi(year, month) {
            const yearGan = (year - 3) % 10;
            const startGan = (yearGan === 0 || yearGan === 5) ? 2 :
                           (yearGan === 1 || yearGan === 6) ? 4 :
                           (yearGan === 2 || yearGan === 7) ? 6 :
                           (yearGan === 3 || yearGan === 8) ? 8 : 0;
            const monthGanIdx = (startGan + month - 1) % 10;
            const monthZhiIdx = (month + 1) % 12;
            return TIANGAN[monthGanIdx] + DIZHI[monthZhiIdx];
        }

        function getDayGanZhi(year, month, day) {
            const baseDate = new Date(1900, 0, 31);
            const targetDate = new Date(year, month - 1, day);
            const diff = Math.floor((targetDate - baseDate) / (1000 * 60 * 60 * 24));
            const ganIdx = (diff + 10) % 10;
            const zhiIdx = (diff + 4) % 12;
            return TIANGAN[ganIdx < 0 ? ganIdx + 10 : ganIdx] + DIZHI[zhiIdx < 0 ? zhiIdx + 12 : zhiIdx];
        }

        function getHourGanZhi(dayGanZhi, hour) {
            const dayGanIdx = TIANGAN.indexOf(dayGanZhi[0]);
            const shichenIdx = SHICHEN_HOURS.indexOf(hour);
            if (shichenIdx === -1) shichenIdx = 0;
            const hourGanIdx = (dayGanIdx * 2 + shichenIdx) % 10;
            return TIANGAN[hourGanIdx] + DIZHI[shichenIdx];
        }

        function getNaYin(ganZhi) {
            const ganIdx = TIANGAN.indexOf(ganZhi[0]);
            const zhiIdx = DIZHI.indexOf(ganZhi[1]);
            const jiaziIdx = (ganIdx * 12 + zhiIdx) % 60;
            return NAYIN[jiaziIdx] || '未知';
        }

        function getChangSheng(dayGan, zhi) {
            const table = CHANGSHENG_TABLE[dayGan];
            if (!table) return '-';
            const index = table.indexOf(zhi);
            return index !== -1 ? CHANGSHENG_NAME[index] : '-';
        }

        function getJieQi(year, month, day) {
            const jieqiTable = [
                { month: 1, day: 5, name: '小寒' }, { month: 1, day: 20, name: '大寒' },
                { month: 2, day: 4, name: '立春' }, { month: 2, day: 19, name: '雨水' },
                { month: 3, day: 5, name: '惊蛰' }, { month: 3, day: 20, name: '春分' },
                { month: 4, day: 4, name: '清明' }, { month: 4, day: 20, name: '谷雨' },
                { month: 5, day: 5, name: '立夏' }, { month: 5, day: 21, name: '小满' },
                { month: 6, day: 5, name: '芒种' }, { month: 6, day: 21, name: '夏至' },
                { month: 7, day: 7, name: '小暑' }, { month: 7, day: 23, name: '大暑' },
                { month: 8, day: 7, name: '立秋' }, { month: 8, day: 23, name: '处暑' },
                { month: 9, day: 7, name: '白露' }, { month: 9, day: 23, name: '秋分' },
                { month: 10, day: 8, name: '寒露' }, { month: 10, day: 24, name: '霜降' },
                { month: 11, day: 7, name: '立冬' }, { month: 11, day: 22, name: '小雪' },
                { month: 12, day: 7, name: '大雪' }, { month: 12, day: 22, name: '冬至' }
            ];
            for (let jq of jieqiTable) {
                if (month === jq.month && day >= jq.day) return jq.name;
            }
            return jieqiTable[0].name;
        }

        function getShengXiao(year) {
            const idx = (year - 4) % 12;
            return SHENGXIAO[idx < 0 ? idx + 12 : idx];
        }

        // 计算四柱
        function calculateSiZhu(year, month, day, hour) {
            const jieqi = getJieQi(year, month, day);
            const lunarYear = (jieqi === '立春' || jieqi === '雨水' || month > 2) ? year : year - 1;
            const yearGanZhi = getYearGanZhi(lunarYear);
            const monthGanZhi = getMonthGanZhi(year, month);
            const dayGanZhi = getDayGanZhi(year, month, day);
            const hourGanZhi = getHourGanZhi(dayGanZhi, hour);
            return { year: yearGanZhi, month: monthGanZhi, day: dayGanZhi, hour: hourGanZhi, jieqi };
        }

        // 计算胎元、命宫、身宫、空亡
        function calculateExtra(year, month, day, sz) {
            const monthGanIdx = TIANGAN.indexOf(sz.month[0]);
            const monthZhiIdx = DIZHI.indexOf(sz.month[1]);
            const taiYuanGanIdx = (monthGanIdx + 5) % 10;
            const taiYuan = TIANGAN[taiYuanGanIdx] + DIZHI[(monthZhiIdx + 6) % 12];

            const hourZhiIdx = DIZHI.indexOf(sz.hour[1]);
            const mingGongIdx = (monthZhiIdx + hourZhiIdx + 2) % 12;
            const mingGong = DIZHI[mingGongIdx];

            const shenGong = sz.day[1];

            const jiaZiIdx = (TIANGAN.indexOf(sz.day[0]) + DIZHI.indexOf(sz.day[1])) % 60;
            const kongWang = ['戌', '亥', '申', '酉', '午', '未', '辰', '巳', '寅', '卯', '子', '丑'][(jiaZiIdx % 12)];

            return { taiYuan, mingGong, shenGong, kongWang };
        }

        // 计算十神
        function calculateShiShen(sz) {
            const riGan = sz.day[0];
            const shenMap = ['甲','丙','戊','庚','壬'].includes(riGan) ? SHISHEN_YANG[riGan] : SHISHEN_YIN[riGan];
            const result = {};
            const allGan = [sz.year[0], sz.month[0], sz.day[0], sz.hour[0]];
            const allZhi = [sz.year[1], sz.month[1], sz.day[1], sz.hour[1]];
            ['年', '月', '日', '时'].forEach((label, idx) => {
                const ganKey = label + '干';
                const zhiKey = label + '支';
                result[ganKey] = shenMap[TIANGAN.indexOf(allGan[idx])] || '?';
                result[zhiKey] = shenMap[DIZHI.indexOf(allZhi[idx])] || '?';
            });
            return result;
        }

        // 计算大运
        function calculateDaYun(year, month, day, hour, sz) {
            const startAge = 3;
            const yearGan = sz.year[0];
            const isYang = ['甲', '丙', '戊', '庚', '壬'].includes(yearGan);
            const direction = isYang ? 1 : -1;

            const dayun = [];
            let currentGanIdx = TIANGAN.indexOf(sz.month[0]);
            let currentZhiIdx = DIZHI.indexOf(sz.month[1]);

            for (let i = 0; i < 8; i++) {
                dayun.push(TIANGAN[currentGanIdx] + DIZHI[currentZhiIdx]);
                currentGanIdx = (currentGanIdx + direction + 10) % 10;
                currentZhiIdx = (currentZhiIdx + direction + 12) % 12;
            }

            return { startAge, direction, dayun };
        }

        // 计算流年
        function calculateLiuNian(dayun, startAge, currentYear) {
            const liunian = [];
            const currentDayunIdx = Math.floor((currentYear - startAge) / 10);

            for (let i = 0; i < 10; i++) {
                const year = currentYear + i - (currentYear % 10) + (currentDayunIdx * 10);
                const ganzhi = TIANGAN[(year - 4) % 10] + DIZHI[(year - 4) % 12];
                liunian.push({
                    year: year,
                    ganzhi: ganzhi,
                    shishen: '偏财' // 简化
                });
            }
            return liunian;
        }

        // 计算神煞
        function calculateShenSha(sz, sx) {
            const shenList = [];
            const monthZhi = sz.month[1];
            const dayZhi = sz.day[1];
            const hourZhi = sz.hour[1];
            const dayGan = sz.day[0];

            // 天乙贵人（简化）
            const tiy贵人Map = { '甲': '丑未', '乙': '子申', '丙': '亥酉', '丁': '子申', '戊': '丑未', '己': '申子', '庚': '午寅', '辛': '午寅', '壬': '卯巳', '癸': '卯巳' };
            if (tiy贵人Map[dayGan]?.includes(monthZhi) || tiy贵人Map[dayGan]?.includes(hourZhi)) {
                shenList.push('天乙贵人');
            }

            // 桃花
            const taoHuaZhi = SHEN_SHA['桃花'][sx];
            if ([monthZhi, dayZhi, hourZhi].includes(taoHuaZhi)) {
                shenList.push('桃花');
            }

            // 羊刃
            const yangRenZhi = SHEN_SHA['羊刃'][dayGan];
            if ([dayZhi].includes(yangRenZhi)) {
                shenList.push('羊刃');
            }

            // 驿马
            const yiMaZhi = SHEN_SHA['驿马'][sx];
            if ([monthZhi, dayZhi, hourZhi].includes(yiMaZhi)) {
                shenList.push('驿马');
            }

            // 华盖
            const huaGaiZhi = SHEN_SHA['华盖'][sx];
            if ([dayZhi].includes(huaGaiZhi)) {
                shenList.push('华盖');
            }

            return shenList;
        }

        // ==================== 排盘主函数 ====================
        function calculateBazi() {
            try {
                console.log('开始排盘...');

                const year = parseInt(document.getElementById('year').value);
                const month = parseInt(document.getElementById('month').value);
                const day = parseInt(document.getElementById('day').value);

                if (!year || !month || !day) {
                    alert('请选择完整的出生日期');
                    return;
                }

                if (selectedHour < 0) {
                    alert('请选择出生时辰');
                    return;
                }

                // 计算四柱
                const sz = calculateSiZhu(year, month, day, selectedHour);

                // 基本信息
                document.getElementById('solar-date').textContent = `${year}年${month}月${day}日 ${selectedHour}:00`;
                document.getElementById('lunar-date').textContent = `农历${year}年${month}月${day}日（简化）`;
                document.getElementById('shengxiao').textContent = getShengXiao(year);
                document.getElementById('jieqi').textContent = sz.jieqi;

                // 显示八字四柱（含纳音）
                displayBazi(sz);

                // 计算五行
                const wuxingCount = countWuXing(sz);
                displayWuXing(wuxingCount);

                // 日主
                const rizhu = sz.day[0];
                document.getElementById('rizhu').innerHTML = `日主：<span style="font-size:2rem;color:#FF6B35;">${rizhu}（${WU_XING[rizhu]}）</span>`;

                // 十神
                const shishen = calculateShiShen(sz);
                displayShiShen(shishen);

                // 地支藏干
                displayCangGan(sz);

                // 节气与运数
                displayQiYun(sz, year, month, day);

                // 胎元、命宫、身宫、空亡
                const extra = calculateExtra(year, month, day, sz);
                displayExtra(extra);

                // 大运
                const dayun = calculateDaYun(year, month, day, selectedHour, sz);
                displayDaYun(dayun, year, month, day);

                // 流年
                const liunian = calculateLiuNian(dayun.dayun, dayun.startAge, year);
                displayLiuNian(liunian);

                // 神煞
                const shenSha = calculateShenSha(sz, getShengXiao(year));
                displayShenSha(shenSha);

                // 十二长生
                displayChangSheng(sz);

                // 显示结果
                document.getElementById('result-card').classList.add('show');
                document.getElementById('result-card').scrollIntoView({ behavior: 'smooth' });

            } catch (error) {
                console.error('八字计算错误:', error);
                alert('计算失败：' + error.message);
            }
        }

        // 初始化
        init();
    </script>
</body>
</html>

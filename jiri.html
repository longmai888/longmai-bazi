    <title>龙脉文化 · 黄道吉日</title>
    <link rel="stylesheet" href="style.css">

    <style>
        .jiri-hero { background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%); color: white; padding: 40px 20px; text-align: center; margin-bottom: 40px; }
        .jiri-hero h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .jiri-content { max-width: 1200px; margin: 0 auto; padding: 0 20px 60px; }
        .calendar { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .calendar-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; transition: all 0.3s; }
        .calendar-day:hover { background: #f0f0f0; }
        .calendar-day.auspicious { background: linear-gradient(135deg, #90EE90, #32CD32); color: white; }
        .calendar-day.inauspicious { background: linear-gradient(135deg, #FFB6C1, #FF69B4); color: white; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 15px 40px; border-radius: 25px; font-size: 1.1rem; cursor: pointer; margin: 10px; }
        .form-group { margin-bottom: 20px; background: white; padding: 20px; border-radius: 12px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        .form-group select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="jiri-hero">
        <h1>📅 黄道吉日</h1>
        <p class="subtitle">择吉避凶 · 趋吉避害 · 万事如意</p>
    </div>
    <div class="jiri-content">
        <div class="form-group">
            <label>选择事项</label>

                <option value="other">其他事项</option>
            </select>
        </div>
        <div style="text-align: center; margin: 20px 0;">
            <button class="btn-primary" onclick="prevMonth()">?上月</button>
            <span id="current-month" style="font-size: 1.3rem; font-weight: bold; color: #764ba2; margin: 0 20px;">2026??/span>
            <button class="btn-primary" onclick="nextMonth()">下月 ?/button>
        </div>
        <div class="calendar">
            <div class="calendar-grid">
                <div style="text-align: center; font-weight: bold;">?/div>

                <div style="text-align: center; font-weight: bold;">?/div>
                <div style="text-align: center; font-weight: bold;">?/div>
                <div class="calendar-day" id="day-grid">
                    <!-- 日期将在这里生成 -->
                </div>
            </div>
        </div>
        <div id="day-detail" style="display: none; background: white; padding: 25px; border-radius: 12px; margin-top: 30px;">
            <h4 style="color: #764ba2; margin-bottom: 15px;">日期详情</h4>
            <p id="detail-text" style="line-height: 1.8; color: #555;"></p>
        </div>
    </div>

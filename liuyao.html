    <main class="main-content">
        <div class="card">
            <h1>六爻占卜</h1>

            </div>
            
            <div id="liuyao-result" style="margin-top: 30px; display: none;">
                <h3 style="color: #f39c12; text-align: center;">卦象结果</h3>
                <div id="gua-xiang" style="text-align: center; font-size: 2rem; margin: 20px 0;"></div>

    <script src="script.js"></script>
    <script>
        function startLiuyao() {
            var yao = generateLiuyao();
            var result = interpretLiuyao(yao);
            
            var guaXiang = '';
            var hasChange = false;
            
            for (var i = 5; i >= 0; i--) {
                var line = result[i];
                guaXiang += line.symbol + '<br>';
                if (line.isChange) hasChange = true;
            }
            
            document.getElementById('gua-xiang').innerHTML = guaXiang;
            document.getElementById('gua-ci').innerHTML = hasChange ? '本卦有变爻，需看变卦' : '本卦无变爻';
            document.getElementById('liuyao-result').style.display = 'block';
            
            showToast('起卦完成！', 'success');
        }
    </script>

        '110100': {name:'雷泽归妹', symbol:'☳☱', ci:'征凶，无攸利。', hint:'归妹卦代表归宿婚嫁。感情上需谨慎，不可冲动。'},
        '101100': {name:'雷火丰', symbol:'☳☲', ci:'亨，王假之。', hint:'丰卦代表丰盛充实。事业鼎盛期，但盛极必衰需警惕。'},
        '001101': {name:'火山旅', symbol:'☲☶', ci:'小亨，旅贞吉。', hint:'旅卦代表旅行在外。出行有利，但需小心谨慎。'},
        '011011': {name:'巽为风', symbol:'☴☴', ci:'小亨，利有攸往。', hint:'巽卦代表顺从柔和。以柔克刚，顺势而为。'},
        '110110': {name:'兑为泽', symbol:'☱☱', ci:'亨利贞。', hint:'兑卦代表喜悦和乐。人际关系好，心情愉悦。'},
        '010011': {name:'风水涣', symbol:'☴☵', ci:'亨，王假有庙。', hint:'涣卦代表涣散离散。需要凝聚人心，重新整合。'},
        '110010': {name:'水泽节', symbol:'☵☱', ci:'亨，苦节不可贞。', hint:'节卦代表节制适度。凡事有度，过犹不及。'},
        '110011': {name:'风泽中孚', symbol:'☴☱', ci:'豚鱼吉。', hint:'中孚卦代表诚信感化。以诚待人，信守承诺。'},
        '001100': {name:'雷山小过', symbol:'☳☶', ci:'亨利贞。', hint:'小过卦代表小有过越。小事可为，大事不宜。'},
        '010101': {name:'水火既济', symbol:'☵☲', ci:'亨小利贞。', hint:'既济卦代表事已成功。功成名就，但需防骄傲。'},
        '101010': {name:'火水未济', symbol:'☲☵', ci:'亨，小狐汔济。', hint:'未济卦代表尚未完成。革命尚未成功，仍需努力。'}
    };

    // 六亲对应
    var liuQin = ['父母','兄弟','子孙','妻财','官鬼'];

    // ===== 摇卦逻辑 =====
    var yaoResults = [];
    var shakeCount = 0;

    function shakeCoins() {
        if (shakeCount >= 6) return;
        
        var btn = document.getElementById('shakeBtn');
        btn.disabled = true;
        
        // 铜钱动画
        var coins = [document.getElementById('coin1'), document.getElementById('coin2'), document.getElementById('coin3')];
        coins.forEach(function(c) { c.classList.add('flipping'); });
        
        setTimeout(function() {
            // 随机结果：3个铜钱，正面=3，反面=2
            var values = [];
            for (var i = 0; i < 3; i++) {
                var val = Math.random() > 0.5 ? 3 : 2;
                values.push(val);
                coins[i].classList.remove('flipping');
                if (val === 3) {
                    coins[i].textContent = '正';
                    coins[i].classList.remove('yin');
                } else {
                    coins[i].textContent = '反';
                    coins[i].classList.add('yin');
                }
            }
            
            var sum = values[0] + values[1] + values[2];
            // 6=老阴(变), 7=少阳, 8=少阴, 9=老阳(变)
            yaoResults.push(sum);
            
            // 更新进度
            var dot = document.getElementById('dot' + (shakeCount + 1));
            var yaoType = (sum === 7 || sum === 9) ? '阳' : '阴';
            var isDong = (sum === 6 || sum === 9);
            dot.textContent = yaoType + (isDong ? '动' : '');
            dot.classList.remove('current');
            dot.classList.add('done');
            
            shakeCount++;
            
            if (shakeCount < 6) {
                var nextDot = document.getElementById('dot' + (shakeCount + 1));
                nextDot.classList.add('current');
                btn.textContent = '🎲 继续摇卦（第' + (shakeCount + 1) + '次）';
                btn.disabled = false;
            } else {
                btn.textContent = '✅ 摇卦完成！';
                document.getElementById('shake-hint').textContent = '六爻已全，正在排卦...';
                setTimeout(function() { showResult(yaoResults); }, 500);
            }
        }, 600);
    }

    // ===== 显示结果 =====
    function showResult(yaos) {
        // 构建本卦二进制（初爻在前）
        var benBin = '';
        var bianBin = '';
        var dongYao = [];
        
        for (var i = 0; i < 6; i++) {
            var s = yaos[i];
            var isYang = (s === 7 || s === 9);
            var isDong = (s === 6 || s === 9);
            benBin += isYang ? '1' : '0';
            
            if (isDong) {
                dongYao.push(i);
                bianBin += isYang ? '0' : '1'; // 动则变
            } else {
                bianBin += isYang ? '1' : '0';
            }
        }
        
        // 反转（卦数据是上卦在前）
        var benKey = benBin.split('').reverse().join('');
        var bianKey = bianBin.split('').reverse().join('');
        
        var benGua = guaData[benKey] || {name:'未知卦', symbol:'?', ci:'暂无卦辞', hint:'暂无提示'};
        
        document.getElementById('bengua-name').textContent = benGua.name;
        document.getElementById('bengua-symbol').textContent = benGua.symbol;
        
        if (dongYao.length > 0) {
            var bianGua = guaData[bianKey] || {name:'未知卦', symbol:'?'};
            document.getElementById('biangua-name').textContent = bianGua.name;
            document.getElementById('biangua-symbol').textContent = bianGua.symbol;
            document.getElementById('biangua-col').style.display = 'block';
        } else {
            document.getElementById('biangua-col').style.display = 'none';
        }
        
        // 世应位置（简化：根据上下卦关系）
        var shiPos = 4, yingPos = 1; // 默认
        
        // 画爻线
        var linesHtml = '';
        var yaoNames = ['初爻','二爻','三爻','四爻','五爻','上爻'];
        for (var i = 5; i >= 0; i--) {
            var s = yaos[i];
            var isYang = (s === 7 || s === 9);
            var isDong = (s === 6 || s === 9);
            var rowClass = isDong ? 'yao-row dong' : 'yao-row';
            
            var lineHtml = '';
            if (isYang) {
                lineHtml = '<div class="yao-segment yang"></div>';
            } else {
                lineHtml = '<div class="yao-segment yin"></div><div class="yao-segment yin"></div>';
            }
            
            var infoText = '';
            if (isDong) infoText += '<span class="dong-mark">◎动</span> ';
            if (i === shiPos) infoText += '<span class="shi-mark">世</span>';
            if (i === yingPos) infoText += '<span class="ying-mark">应</span>';
            
            linesHtml += '<div class="' + rowClass + '">';
            linesHtml += '<div class="yao-pos">' + yaoNames[i] + '</div>';
            linesHtml += '<div class="yao-line">' + lineHtml + '</div>';
            linesHtml += '<div class="yao-info">' + infoText + '</div>';
            linesHtml += '</div>';
        }
        document.getElementById('yao-lines').innerHTML = linesHtml;
        
        // 卦辞
        document.getElementById('gua-ci').textContent = '【' + benGua.name + '】' + benGua.ci;
        
        var hintText = benGua.hint;
        if (dongYao.length > 0) {
            hintText += ' 本卦有' + dongYao.length + '个动爻，变卦为' + (guaData[bianKey] ? guaData[bianKey].name : '未知') + '。';
            if (guaData[bianKey]) hintText += guaData[bianKey].hint;
        } else {
            hintText += ' 本卦无动爻，以本卦卦辞为主。';
        }
        document.getElementById('gua-hint').textContent = hintText;
        
        document.getElementById('result-area').classList.add('show');
        document.getElementById('result-area').scrollIntoView({ behavior: 'smooth' });
    }

    // ===== 手动起卦 =====
    (function() {
        var html = '';
        var names = ['初爻','二爻','三爻','四爻','五爻','上爻'];
        for (var i = 0; i < 6; i++) {
            html += '<div class="manual-row">';
            html += '<label>' + names[i] + '</label>';
            html += '<select id="manual-' + i + '">';
            html += '<option value="7">少阳 ——（阳静）</option>';
            html += '<option value="8">少阴 — —（阴静）</option>';
            html += '<option value="9">老阳 ——○（阳动）</option>';
            html += '<option value="6">老阴 — —×（阴动）</option>';
            html += '</select></div>';
        }
        document.getElementById('manual-rows').innerHTML = html;
    })();

    function manualGua() {
        var yaos = [];
        for (var i = 0; i < 6; i++) {
            yaos.push(parseInt(document.getElementById('manual-' + i).value));
        }
        showResult(yaos);
    }

    // ===== 时间起卦 =====
    function updateTimeDisplay() {
        var now = new Date();
        var diZhi = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
        var h = now.getHours();
        var dzIdx = Math.floor((h + 1) / 2) % 12;
        document.getElementById('time-display').textContent = 
            now.getFullYear() + '年' + (now.getMonth()+1) + '月' + now.getDate() + '日 ' + 
            now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0') + ' ' + diZhi[dzIdx] + '时';
    }
    setInterval(updateTimeDisplay, 1000);
    updateTimeDisplay();

    function timeGua() {
        var now = new Date();
        var y = now.getFullYear(), m = now.getMonth() + 1, d = now.getDate(), h = now.getHours();
        var shangNum = (y + m + d) % 8 || 8;
        var xiaNum = (y + m + d + Math.floor((h + 1) / 2)) % 8 || 8;
        var dongPos = (y + m + d + Math.floor((h + 1) / 2)) % 6 || 6;
        
        // 先天八卦数转三爻
        var bagua = {1:'111',2:'110',3:'101',4:'100',5:'011',6:'010',7:'001',8:'000'};
        var shangBin = bagua[shangNum] || '111';
        var xiaBin = bagua[xiaNum] || '000';
        var fullBin = xiaBin + shangBin; // 初爻在前
        
        var yaos = [];
        for (var i = 0; i < 6; i++) {
            var isYang = fullBin[i] === '1';
            if (i === dongPos - 1) {
                yaos.push(isYang ? 9 : 6); // 动爻
            } else {
                yaos.push(isYang ? 7 : 8); // 静爻
            }
        }
        showResult(yaos);
    }

    // ===== 切换方式 =====
    function switchMethod(method) {
        document.querySelectorAll('.method-tab').forEach(function(t) { t.classList.remove('active'); });
        document.querySelectorAll('.method-content').forEach(function(c) { c.style.display = 'none'; });
        event.target.classList.add('active');
        document.getElementById('method-' + method).style.display = 'block';
        document.getElementById('result-area').classList.remove('show');
    }

    // ===== 重置 =====
    function resetAll() {
        yaoResults = [];
        shakeCount = 0;
        document.getElementById('shakeBtn').textContent = '🎲 开始摇卦（第1次）';
        document.getElementById('shakeBtn').disabled = false;
        document.getElementById('shake-hint').textContent = '需要摇6次，每次得一爻';
        document.querySelectorAll('.yao-dot').forEach(function(d) { 
            d.classList.remove('done','current'); 
        });
        var names = ['初','二','三','四','五','上'];
        for (var i = 0; i < 6; i++) {
            document.getElementById('dot' + (i+1)).textContent = names[i];
        }
        document.getElementById('coin1').textContent = '乾';
        document.getElementById('coin2').textContent = '乾';
        document.getElementById('coin3').textContent = '乾';
        document.querySelectorAll('.coin').forEach(function(c) { c.classList.remove('yin'); });
        document.getElementById('result-area').classList.remove('show');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    </script>

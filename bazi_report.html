<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>龙脉文化八字分析报告（专业版）</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mobile.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/lunar-javascript/1.7.4/lunar.min.js"></script>
    <script src="js/bazi-report-generator.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(180deg, #1a1a2e 0%, #2d1b4e 50%, #4a148c 100%);
            background-attachment: fixed;
            min-height: 100vh;
            line-height: 1.6;
            color: #fff;
            background-attachment: fixed;
            min-height: 100vh;
            line-height: 1.6;
            color: #fff;
            line-height: 1.8;
            color: #333;
        }
        
        .report-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        
        .report-page {
            padding: 40px;
            min-height: 100vh;
            page-break-after: always;
        }
        
        /* 封面样式 */
        .cover-page {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            min-height: 100vh;
        }
        
        .cover-title {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 20px;
            letter-spacing: 10px;
        }
        
        .cover-subtitle {
            font-size: 1.5rem;
            margin-bottom: 40px;
            opacity: 0.9;
        }
        
        .cover-info {
            margin-top: 60px;
            font-size: 1rem;
            line-height: 2;
        }
        
        .cover-info p {
            margin: 10px 0;
        }
        
        .cover-decoration {
            font-size: 4rem;
            margin: 30px 0;
        }
        
        /* 分隔线 */
        .section-divider {
            border: none;
            height: 3px;
            background: linear-gradient(90deg, transparent, #764ba2, transparent);
            margin: 30px 0;
        }
        
        /* 标题样式 */
        .section-title {
            font-size: 1.8rem;
            color: #764ba2;
            text-align: center;
            margin: 40px 0 30px;
            padding-bottom: 15px;
            border-bottom: 3px double #764ba2;
        }
        
        .subsection-title {
            font-size: 1.3rem;
            color: #333;
            margin: 25px 0 15px;
            padding-left: 15px;
            border-left: 4px solid #764ba2;
        }
        
        /* 表格样式 */
        .bazi-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            font-size: 1rem;
        }
        
        .bazi-table th,
        .bazi-table td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }
        
        .bazi-table th {
            background: #f8f9fa;
            font-weight: bold;
        }
        
        .bazi-table .gan {
            color: #e74c3c;
            font-weight: bold;
        }
        
        .bazi-table .zhi {
            color: #3498db;
            font-weight: bold;
        }
        
        /* 信息框 */
        .info-box {
            background: #f8f9fa;
            border-left: 4px solid #764ba2;
            padding: 20px;
            margin: 20px 0;
            border-radius: 0 8px 8px 0;
        }
        
        .info-box h4 {
            color: #764ba2;
            margin-bottom: 10px;
        }
        
        /* 评分星星 */
        .rating {
            color: #f39c12;
            font-size: 1.2rem;
        }
        
        /* 列表样式 */
        .feature-list {
            list-style: none;
            padding: 0;
        }
        
        .feature-list li {
            padding: 8px 0;
            padding-left: 25px;
            position: relative;
        }
        
        .feature-list li:before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #27ae60;
            font-weight: bold;
        }
        
        .warning-list li:before {
            content: "⚠";
            color: #e74c3c;
        }
        
        /* 打印按钮 */
        .print-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }
        
        .print-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        
        /* 五行统计 */
        .wuxing-bar {
            display: flex;
            align-items: center;
            margin: 10px 0;
        }
        
        .wuxing-label {
            width: 60px;
            font-weight: bold;
        }
        
        .wuxing-progress {
            flex: 1;
            height: 20px;
            background: #eee;
            border-radius: 10px;
            overflow: hidden;
            margin: 0 10px;
        }
        
        .wuxing-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.3s;
        }
        
        .wuxing-jin { background: linear-gradient(90deg, #f39c12, #f1c40f); }
        .wuxing-mu { background: linear-gradient(90deg, #27ae60, #2ecc71); }
        .wuxing-shui { background: linear-gradient(90deg, #3498db, #5dade2); }
        .wuxing-huo { background: linear-gradient(90deg, #e74c3c, #ec7063); }
        .wuxing-tu { background: linear-gradient(90deg, #8b4513, #a0522d); }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .report-page {
                padding: 20px;
            }
            
            .cover-title {
                font-size: 2rem;
            }
            
            .section-title {
                font-size: 1.4rem;
            }
        }
        
        @media print {
            .print-btn {
                display: none;
            }
            
            .report-page {
                page-break-after: always;
            }
            
            body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(180deg, #1a1a2e 0%, #2d1b4e 50%, #4a148c 100%);
            background-attachment: fixed;
            min-height: 100vh;
            line-height: 1.6;
            color: #fff;
            background-attachment: fixed;
            min-height: 100vh;
            line-height: 1.6;
            color: #fff;
            }
            
            .report-container {
                box-shadow: none;
            }
        }
    </style>
</head>
<body>
    <div class="report-container" id="reportContainer">
        <!-- 报告内容将通过JavaScript生成 -->
    </div>
    
    <button class="print-btn" onclick="window.print()">🖨️ 打印报告</button>
    
    <script>
        // 生成报告
        function generateReport() {
            // 从URL参数获取数据
            const urlParams = new URLSearchParams(window.location.search);
            const birthData = {
                year: parseInt(urlParams.get('year')),
                month: parseInt(urlParams.get('month')),
                day: parseInt(urlParams.get('day')),
                hour: parseInt(urlParams.get('hour')),
                gender: urlParams.get('gender'),
                name: urlParams.get('name') || '张先生'
            };
            
            if (!birthData.year) {
                document.getElementById('reportContainer').innerHTML = `
                    <div class="report-page" style="text-align: center; padding-top: 100px;">
                        <h2>请先进行八字排盘</h2>
                        <p style="margin-top: 20px;">
                            <a href="bazi_detail.html" style="color: #764ba2;">点击这里进行排盘</a>
                        </p>
                    </div>
                `;
                return;
            }
            
            // 生成八字数据
            const generator = new BaziReportGenerator();
            const report = generator.generateReport(birthData);
            
            // 生成报告HTML
            const reportHTML = generateReportHTML(report, birthData);
            document.getElementById('reportContainer').innerHTML = reportHTML;
        }
        
        // 生成报告HTML
        function generateReportHTML(report, birthData) {
            const { bazi, shiShen, naYin, wuXingCount, dayGanStrength, xiYongShen, shengXiao, xingZuo, xingXiu } = report;
            
            // 辅助函数定义
            function getGeJu(bazi, shiShen) {
                const monthShiShen = shiShen.month;
                if (monthShiShen.includes('官')) return '正官格';
                if (monthShiShen.includes('杀')) return '七杀格';
                if (monthShiShen.includes('印')) return '印绶格';
                if (monthShiShen.includes('财')) return '财格';
                return '普通格';
            }
            
            function getLevel(strength, wuXing) {
                const total = Object.values(wuXing).reduce((a, b) => a + b, 0);
                if (total >= 7 && strength === '身强') return '上格';
                if (total >= 5) return '中格';
                return '下格';
            }
            
            function getGeJuDescription(bazi, shiShen, strength) {
                const geJu = getGeJu(bazi, shiShen);
                return `您的八字为${geJu}。${geJu}之人，性格${strength === '身强' ? '刚毅果断' : '温和内敛'}，有${shiShen.month.includes('官') ? '领导才能' : '专业技能'}，适合在${shiShen.month.includes('官') ? '管理岗位' : '专业领域'}发展。`;
            }
            
            function getFuGuiLevel(strength, wuXing) {
                return strength === '身强' ? '★★★★☆ 中富之命' : '★★★☆☆ 小康之命';
            }
            
            function getFuGuiDescription(strength, wuXing) {
                return strength === '身强' 
                    ? '您有发财的潜质，但需要付出努力。中年后财运渐佳，40-50岁是财富积累的黄金时期。建议稳扎稳打，不要急于求成。'
                    : '您的财运较为平稳，适合稳健理财。通过持续努力，可以积累一定的财富。建议保守投资，避免高风险。';
            }
            
            function getLifeSummary(bazi, shiShen, strength, xiYongShen) {
                return `您是一个${strength === '身强' ? '有能力、有魄力' : '温和、有耐心'}的人，适合在${strength === '身强' ? '竞争中' : '稳定环境中'}成长。早年运势较为平淡，中年后运势渐佳，晚年安稳。一生贵人运不错，关键时刻有人相助。建议：把握中年黄金期，稳扎稳打，必有所成。`;
            }
            
            function getTianGanXingGe(gan) {
                const xingGe = {
                    '甲': '仁慈、正直、有领导力，像大树一样稳重可靠',
                    '乙': '温柔、细腻、善变通，像花草一样柔韧',
                    '丙': '热情、开朗、有礼貌，像太阳一样温暖',
                    '丁': '温和、细腻、有洞察力，像烛光一样温柔',
                    '戊': '诚实、稳重、有包容心，像大地一样厚重',
                    '己': '细心、谨慎、有耐心，像田园一样细腻',
                    '庚': '刚毅、果断、有正义感，像钢铁一样坚强',
                    '辛': '精致、敏感、有品位，像珠宝一样珍贵',
                    '壬': '聪明、灵活、有智慧，像江河一样流动',
                    '癸': '温柔、内敛、有灵性，像雨露一样细腻'
                };
                return xingGe[gan] || '性格独特';
            }
            
            function getDiZhiXingGe(zhi) {
                const xingGe = {
                    '子': '聪明机智，善于思考',
                    '丑': '稳重踏实，勤劳肯干',
                    '寅': '勇敢果断，有进取心',
                    '卯': '温柔善良，有艺术天赋',
                    '辰': '包容大度，有领导才能',
                    '巳': '热情机智，善于交际',
                    '午': '开朗直率，有创造力',
                    '未': '温和细腻，有耐心',
                    '申': '聪明灵活，善于变通',
                    '酉': '精致敏感，追求完美',
                    '戌': '忠诚稳重，有责任感',
                    '亥': '善良包容，有想象力'
                };
                return xingGe[zhi] || '性格独特';
            }
            
            function getShiShenXingGe(shiShen) {
                const xingGeMap = {
                    '正官': '循规蹈矩，责任心强',
                    '七杀': '胆大果决，有魄力',
                    '正印': '智慧高雅，包容温厚',
                    '偏印': '思维独特，直觉敏锐',
                    '正财': '勤俭持家，稳健务实',
                    '偏财': '交际广泛，敢于冒险',
                    '食神': '乐观豁达，有才华',
                    '伤官': '才华横溢，叛逆创新',
                    '比肩': '独立自主，好胜心强',
                    '劫财': '冲动冒险，好争斗'
                };
                
                let html = '';
                Object.values(shiShen).forEach(ss => {
                    if (ss !== '日主' && xingGeMap[ss]) {
                        html += `<li><strong>${ss}：</strong>${xingGeMap[ss]}</li>`;
                    }
                });
                return html;
            }
            
            function getYouDian(bazi, shiShen) {
                return `
                    <li>${bazi.day.gan}日主：${getTianGanXingGe(bazi.day.gan).split('、')[0]}</li>
                    <li>做事有原则，有责任感</li>
                    <li>独立自主，能力强</li>
                    <li>聪明机智，反应快</li>
                    <li>乐观豁达，心态好</li>
                `;
            }
            
            function getQueDian(bazi, shiShen) {
                return `
                    <li>有时过于固执</li>
                    <li>容易急躁冲动</li>
                    <li>自尊心太强</li>
                    <li>有时过于冒险</li>
                    <li>缺乏安全感</li>
                `;
            }
            
            function getShiHeZhiYe(bazi, shiShen, xiYongShen) {
                return `您适合从事需要${bazi.day.gan === '庚' || bazi.day.gan === '辛' ? '决断力、领导力' : '创造力、专业技能'}的工作，如：企业管理、技术专家、金融分析、法律工作等。`;
            }
            
            function getShiYeFangXiang(xiYongShen, shiShen) {
                const hangYe = {
                    '木': '教育、文化、出版、林业',
                    '火': '电子、能源、餐饮、美容',
                    '土': '房地产、建筑、农业、矿产',
                    '金': '金融、机械、汽车、珠宝',
                    '水': '物流、旅游、贸易、咨询'
                };
                
                let html = '';
                xiYongShen.forEach(wx => {
                    if (hangYe[wx]) {
                        html += `<li><strong>${wx}行业：</strong>${hangYe[wx]}</li>`;
                    }
                });
                return html || '<li>根据喜用神选择适合的行业</li>';
            }
            
            function getCaiYunType(shiShen) {
                return shiShen.year.includes('财') || shiShen.month.includes('财') 
                    ? '正财为主，偏财为辅' 
                    : '偏财为主，正财为辅';
            }
            
            function getQiuCaiFangShi(shiShen) {
                return shiShen.year.includes('正财') || shiShen.month.includes('正财')
                    ? '适合稳健投资，不适合投机'
                    : '适合灵活投资，把握机会';
            }
            
            function getCaiYunQiFu(strength) {
                return strength === '身强' ? '中年后财运渐佳' : '财运平稳，需努力积累';
            }
            
            function getShiHeTouZi(xiYongShen) {
                const touZi = {
                    '木': '房地产（长期持有）',
                    '火': '股票基金（价值投资）',
                    '土': '自己的事业（稳健发展）',
                    '金': '金融产品（稳健理财）',
                    '水': '流动性资产'
                };
                
                let html = '';
                xiYongShen.forEach(wx => {
                    if (touZi[wx]) {
                        html += `<li>${touZi[wx]}</li>`;
                    }
                });
                return html || '<li>根据自己的专业领域投资</li>';
            }
            
            function getBuShiHeTouZi(xiYongShen) {
                return `
                    <li>高风险投机（期货、虚拟货币）</li>
                    <li>不熟悉领域的投资</li>
                    <li>借贷投资</li>
                    <li>盲目跟风投资</li>
                `;
            }
            
            function getPeiOuWaiMao(bazi, shiShen) {
                return '中等身材，五官端正，气质优雅';
            }
            
            function getPeiOuXingGe(bazi, shiShen) {
                return '温柔体贴，善解人意，有包容心';
            }
            
            function getPeiOuZhiYe(bazi, shiShen) {
                return '教育、医疗、文化、艺术行业';
            }
            
            function getZuiJiaShuXiang(shengXiao) {
                const he = {
                    '鼠': '牛、龙、猴',
                    '牛': '鼠、蛇、鸡',
                    '虎': '猪、马、狗',
                    '兔': '狗、猪、羊',
                    '龙': '鸡、鼠、猴',
                    '蛇': '猴、鸡、牛',
                    '马': '羊、虎、狗',
                    '羊': '马、兔、猪',
                    '猴': '蛇、鼠、龙',
                    '鸡': '龙、蛇、牛',
                    '狗': '兔、虎、马',
                    '猪': '虎、兔、羊'
                };
                return he[shengXiao] || '根据八字合婚';
            }
            
            function getXiangChongShuXiang(shengXiao) {
                const chong = {
                    '鼠': '马',
                    '牛': '羊',
                    '虎': '猴',
                    '兔': '鸡',
                    '龙': '狗',
                    '蛇': '猪',
                    '马': '鼠',
                    '羊': '牛',
                    '猴': '虎',
                    '鸡': '兔',
                    '狗': '龙',
                    '猪': '蛇'
                };
                return chong[shengXiao] || '无';
            }
            
            function getJieHunShiJian(bazi, shiShen) {
                return '28-32岁为最佳结婚年龄';
            }
            
            function getHunYinZhiLiang(bazi, shiShen) {
                return shiShen.day.includes('官') || shiShen.day.includes('财')
                    ? '中上等，夫妻感情较好'
                    : '中等，需要用心经营';
            }
            
            function getHunYinWeiJi(bazi, shiShen) {
                return '40岁左右需注意沟通';
            }
            
            function getLiHunFengXian(bazi, shiShen) {
                return shiShen.day.includes('伤官') || shiShen.day.includes('劫财')
                    ? '中等，需注意维护'
                    : '较低';
            }
            
            function getTaoHuaType(bazi, shiShen) {
                return shiShen.year.includes('财') || shiShen.year.includes('官')
                    ? '正桃花为主，偶有烂桃花'
                    : '桃花较淡，需主动争取';
            }
            
            function getTaoHuaNianFen(bazi) {
                return '2026、2028、2032、2036年桃花较旺';
            }
            
            function getHunYinJianYi(bazi, shiShen) {
                return `
                    <li>选择配偶时，注重性格相合</li>
                    <li>婚后多沟通，避免冷战</li>
                    <li>40岁左右是婚姻关键期，需特别注意</li>
                    <li>与配偶共同成长，互相支持</li>
                `;
            }
            
            function generateDaYunHTML(bazi, birthData) {
                const currentYear = new Date().getFullYear();
                const age = currentYear - birthData.year;
                const daYunIndex = Math.floor(age / 10);
                
                return `
                    <div class="info-box">
                        <h4>当前大运（${currentYear - (age % 10)}-${currentYear + (10 - age % 10)}岁）</h4>
                        <p><strong>大运干支：</strong>${bazi.year.gan}${bazi.month.zhi}运</p>
                        <p><strong>吉凶：</strong>★★★★☆ 吉运</p>
                        <p><strong>事业：</strong>事业上升期，机会增多</p>
                        <p><strong>财运：</strong>财运渐佳，收入增加</p>
                    </div>
                `;
            }
            
            function getQuNianHuiGu(bazi) {
                return '去年事业有进展，但压力较大。财运一般，有进有出。感情稳定，偶有争吵。健康状况良好。';
            }
